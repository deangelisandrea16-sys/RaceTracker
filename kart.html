<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Race Tracker">
<title>Race Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#09090b;--bg2:#1c1c1f;--bg3:#111113;
  --border:#3f3f46;--border2:#52525b;
  --text:#ffffff;--text2:#f4f4f5;--text3:#e4e4e7;--text4:#a1a1aa;
  --task-border:#52525b;--task-color:#a1a1aa;
  --modal-bg:#1c1c1f;--input-bg:#09090b;
  --btn-bg:#2a2a2e;--btn-color:#f4f4f5;
}
body.light{
  --bg:#f4f4f5;--bg2:#ffffff;--bg3:#f1f1f3;
  --border:#d4d4d8;--border2:#a1a1aa;
  --text:#09090b;--text2:#18181b;--text3:#3f3f46;--text4:#71717a;
  --task-border:#a1a1aa;--task-color:#71717a;
  --modal-bg:#ffffff;--input-bg:#f4f4f5;
  --btn-bg:#e4e4e7;--btn-color:#18181b;
}
body{font-family:'Courier New',monospace;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;padding-bottom:80px;transition:background .2s,color .2s;-webkit-text-size-adjust:100%;overflow-x:hidden;overflow-y:auto;}
html{background:var(--bg);overflow-x:hidden;overflow-y:auto;height:100%;}
html,body{overscroll-behavior-x:none;}
.header{border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:space-between;margin-top:0;}
.header::before{content:'';position:absolute;top:-200px;left:0;right:0;height:200px;background:var(--bg);z-index:-1;}
.header-dot{width:8px;height:8px;border-radius:50%;background:#ef4444;display:inline-block;margin-right:8px;animation:pulse 2s infinite;}
.header-dot.connected{background:#22c55e;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.header-sub{font-size:10px;color:var(--text4);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;font-weight:600;}
.header-title{font-size:22px;font-weight:900;color:var(--text);letter-spacing:1px;}
.header-right{display:flex;gap:8px;align-items:center;}
.theme-btn{background:none;border:1px solid var(--border2);border-radius:8px;padding:6px 10px;font-size:16px;cursor:pointer;color:var(--text);}
.sync-status{font-size:10px;font-weight:700;color:var(--text4);letter-spacing:1px;}
.sync-status.ok{color:#22c55e;}.sync-status.err{color:#ef4444;}
/* NAV MENU */
.nav-bar{display:flex;align-items:center;border-bottom:1px solid var(--border);background:var(--bg);padding:0 16px;height:44px;}
.nav-current{font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--text);flex:1;}
.menu-btn{display:none;}
/* FLOATING HAMBURGER */
.fab-menu{position:fixed;top:62px;right:16px;width:38px;height:38px;border-radius:50%;background:var(--bg2);border:1px solid var(--border2);color:var(--text);font-size:15px;cursor:pointer;z-index:101;box-shadow:0 2px 10px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-family:inherit;-webkit-tap-highlight-color:transparent;}
.nav-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:150;display:none;align-items:flex-end;}
.nav-overlay.open{display:flex;}
.nav-menu{background:var(--modal-bg);border-radius:16px 16px 0 0;width:100%;padding:20px;border-top:1px solid var(--border);}
.nav-item{display:flex;align-items:center;gap:12px;padding:14px 12px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:800;color:var(--text3);letter-spacing:1px;font-family:inherit;border:none;background:none;width:100%;text-align:left;}
.nav-item:active{background:var(--bg3);}
.nav-item.active{color:var(--text);background:var(--bg3);}
.nav-item-icon{font-size:18px;width:28px;text-align:center;}
.nav-close{font-size:11px;font-weight:700;color:var(--text4);text-align:center;padding:12px;cursor:pointer;letter-spacing:2px;}
/* FILTER BAR */
.filter-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.filter-chip{padding:6px 12px;border-radius:8px;border:1px solid var(--border2);background:none;color:var(--text4);font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer;font-family:inherit;text-transform:uppercase;}
.filter-chip.active{color:var(--text);border-color:var(--text);background:var(--bg3);}
.filter-chip.f-green{border-color:#16a34a;color:#4ade80;}
.filter-chip.f-green.active{background:#052e16;}
.filter-chip.f-orange{border-color:#d97706;color:#fbbf24;}
.filter-chip.f-orange.active{background:#1c1003;}
.filter-chip.f-red{border-color:#dc2626;color:#f87171;}
.filter-chip.f-red.active{background:#1c0303;}
body.light .filter-chip.f-green{color:#15803d;border-color:#16a34a;}
body.light .filter-chip.f-green.active{background:#dcfce7;}
body.light .filter-chip.f-orange{color:#b45309;border-color:#d97706;}
body.light .filter-chip.f-orange.active{background:#fef3c7;}
body.light .filter-chip.f-red{color:#b91c1c;border-color:#dc2626;}
body.light .filter-chip.f-red.active{background:#fee2e2;}
.subtabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);}
.subtab{padding:10px 16px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:none;border:none;color:var(--text4);cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;}
.subtab.active{color:var(--text);border-bottom-color:var(--text);}
.content{padding:16px;}
.hint{font-size:11px;color:var(--text4);margin-bottom:12px;font-weight:500;}
.card{border:1px solid var(--border);border-radius:12px;padding:14px;background:var(--bg2);margin-bottom:12px;}
.card-inner{border-radius:8px;padding:10px;background:var(--bg3);margin-bottom:8px;}.card-inner:last-child{margin-bottom:0;}
.pilot-cat{font-size:11px;font-weight:800;letter-spacing:3px;}
.pilot-index{font-size:11px;font-weight:800;color:var(--text4);min-width:22px;text-align:right;margin-right:2px;}
.pilot-num{font-size:20px;font-weight:900;color:var(--text);}
.pilot-name{font-size:14px;font-weight:700;color:var(--text2);}
.pilot-team{font-size:15px;font-weight:800;color:var(--text3);margin-top:4px;letter-spacing:.5px;}
.pilot-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.parity-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;border:1px solid var(--border2);color:var(--text3);}
.group-badge{font-size:11px;font-weight:900;padding:3px 10px;border-radius:4px;border:1.5px solid var(--border2);color:var(--text);}
.group-badge.set{border-color:#60a5fa;color:#60a5fa;background:rgba(96,165,250,.1);}
body.light .group-badge.set{border-color:#2563eb;color:#2563eb;background:rgba(37,99,235,.08);}
.pilot-edit-btn{font-size:11px;font-weight:600;color:var(--text3);background:none;border:1px solid var(--border);border-radius:5px;padding:4px 10px;cursor:pointer;font-family:inherit;}
.tasks{display:flex;flex-wrap:wrap;gap:7px;}
.task-btn{font-size:11px;font-weight:700;padding:5px 10px;border-radius:6px;border:1px solid var(--task-border);color:var(--task-color);background:none;cursor:pointer;font-family:inherit;transition:all .15s;letter-spacing:.5px;}
.task-btn.green{border-color:#16a34a;background:#052e16;color:#4ade80;}
.task-btn.orange{border-color:#d97706;background:#1c1003;color:#fbbf24;}
.task-btn.red{border-color:#dc2626;background:#1c0303;color:#f87171;}
body.light .task-btn.green{background:#dcfce7;color:#15803d;border-color:#16a34a;}
body.light .task-btn.orange{background:#fef3c7;color:#b45309;border-color:#d97706;}
body.light .task-btn.red{background:#fee2e2;color:#b91c1c;border-color:#dc2626;}
.note-wrap{margin-top:10px;}
.note-label{font-size:10px;font-weight:800;color:var(--text4);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;display:block;}
.note-area{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:12px;font-weight:500;color:var(--text2);font-family:inherit;resize:none;outline:none;min-height:56px;}
.note-area::placeholder{color:var(--text4);}
.io-row{display:flex;gap:8px;margin-bottom:10px;}
.io-btn{flex:1;padding:11px 8px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;font-size:11px;font-weight:700;color:var(--btn-color);cursor:pointer;font-family:inherit;text-align:center;letter-spacing:.5px;}
.io-btn.export{border-color:#34d399;color:#34d399;}
.io-btn.import{border-color:#60a5fa;color:#60a5fa;}
body.light .io-btn.export{border-color:#059669;color:#059669;}
body.light .io-btn.import{border-color:#2563eb;color:#2563eb;}
.mgmt-btn{width:100%;padding:12px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;font-size:13px;font-weight:700;color:var(--btn-color);cursor:pointer;font-family:inherit;margin-bottom:10px;letter-spacing:.5px;}
.slot-time{font-size:18px;font-weight:900;color:var(--text);}
.slot-label{font-size:12px;font-weight:800;letter-spacing:1px;}
.slot-type{font-size:10px;font-weight:600;color:var(--text4);margin-left:auto;letter-spacing:1px;}
.slot-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.inner-num{font-size:18px;font-weight:900;color:var(--text);}
.inner-name{font-size:13px;font-weight:700;color:var(--text2);}
.inner-team{font-size:11px;font-weight:500;color:var(--text4);margin-left:auto;}
.inner-group{font-size:11px;font-weight:900;color:#60a5fa;margin-left:6px;}
body.light .inner-group{color:#2563eb;}
.day-tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--bg);scrollbar-width:none;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{padding:10px 14px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:none;border:none;color:var(--text4);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;font-family:inherit;}
.day-tab.active{color:var(--text);border-bottom-color:var(--text);background:var(--bg2);}
.session-divider{font-size:10px;font-weight:800;color:var(--text4);letter-spacing:3px;text-transform:uppercase;padding:10px 0 6px;border-top:1px solid var(--border);margin-top:4px;}
.session-divider:first-child{border-top:none;margin-top:0;}
.final-card{border:1px solid #fbbf24;border-radius:12px;padding:14px;background:var(--bg2);margin-bottom:12px;}
.final-title{font-size:14px;font-weight:900;color:#fbbf24;letter-spacing:2px;margin-bottom:8px;}
body.light .final-card{border-color:#d97706;}
body.light .final-title{color:#d97706;}
.final-row{display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:var(--text3);padding:4px 0;border-bottom:1px solid var(--border);}
.final-row:last-child{border-bottom:none;}
.final-time{font-weight:900;color:var(--text);}
.section-editor{border-bottom:1px solid var(--border);padding:16px;background:var(--bg);}
.section-label{font-size:11px;font-weight:700;color:var(--text4);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.sections-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.section-chip{display:flex;align-items:center;gap:4px;padding:5px 10px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;}
.section-chip .del{color:var(--text4);font-size:13px;}
.add-row{display:flex;gap:8px;}
.add-input{flex:1;padding:9px 12px;background:var(--input-bg);border:1px solid var(--border2);border-radius:8px;font-size:12px;font-weight:600;color:var(--text);outline:none;font-family:inherit;}
.add-btn{padding:9px 14px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;font-size:11px;font-weight:700;color:var(--btn-color);cursor:pointer;font-family:inherit;}
.track-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:6px;margin-top:8px;}
.track-btn{padding:8px 6px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);cursor:pointer;font-family:inherit;font-size:10px;font-weight:700;color:var(--text4);text-align:center;line-height:1.3;word-break:break-word;min-height:40px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.track-btn.green{background:#052e16;border-color:#16a34a;color:#4ade80;}
.track-btn.orange{background:#1c1003;border-color:#d97706;color:#fbbf24;}
.track-btn.red{background:#1c0303;border-color:#dc2626;color:#f87171;}
body.light .track-btn.green{background:#dcfce7;border-color:#16a34a;color:#15803d;}
body.light .track-btn.orange{background:#fef3c7;border-color:#d97706;color:#b45309;}
body.light .track-btn.red{background:#fee2e2;border-color:#dc2626;color:#b91c1c;}
.track-session-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(55px,1fr));gap:6px;margin-top:8px;}
.track-pilot-btn{padding:6px 4px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);cursor:pointer;font-family:inherit;font-size:11px;font-weight:900;color:var(--text4);text-align:center;min-height:36px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.track-pilot-btn.green{background:#052e16;border-color:#16a34a;color:#4ade80;}
.track-pilot-btn.orange{background:#1c1003;border-color:#d97706;color:#fbbf24;}
.track-pilot-btn.red{background:#1c0303;border-color:#dc2626;color:#f87171;}
body.light .track-pilot-btn.green{background:#dcfce7;border-color:#16a34a;color:#15803d;}
body.light .track-pilot-btn.orange{background:#fef3c7;border-color:#d97706;color:#b45309;}
body.light .track-pilot-btn.red{background:#fee2e2;border-color:#dc2626;color:#b91c1c;}
.no-group-warning{font-size:10px;color:#fbbf24;font-weight:600;margin-top:4px;}
/* HIGHLIGHT PILOTA (foto/video) - supports multiple */
.card.hl-foto{border:2px solid #22d3ee;box-shadow:0 0 0 1px #22d3ee,inset 0 0 0 1px rgba(34,211,238,.08);background:rgba(34,211,238,.06);}
.card.hl-video{border:2px solid #f472b6;box-shadow:0 0 0 1px #f472b6,inset 0 0 0 1px rgba(244,114,182,.08);background:rgba(244,114,182,.06);}
.card.hl-priority{border:2px solid #fbbf24;box-shadow:0 0 0 1px #fbbf24,inset 0 0 0 1px rgba(251,191,36,.08);background:rgba(251,191,36,.06);}
.card.hl-both{border:2px solid;border-image:linear-gradient(135deg,#22d3ee,#f472b6) 1;box-shadow:0 0 12px rgba(34,211,238,.15),0 0 12px rgba(244,114,182,.15);background:linear-gradient(135deg,rgba(34,211,238,.05),rgba(244,114,182,.05));}
body.light .card.hl-foto{border-color:#0891b2;box-shadow:0 0 0 1px #0891b2;background:rgba(8,145,178,.06);}
body.light .card.hl-video{border-color:#db2777;box-shadow:0 0 0 1px #db2777;background:rgba(219,39,119,.06);}
body.light .card.hl-priority{border-color:#d97706;box-shadow:0 0 0 1px #d97706;background:rgba(217,119,6,.06);}
body.light .card.hl-both{border-image:linear-gradient(135deg,#0891b2,#db2777) 1;box-shadow:0 0 8px rgba(8,145,178,.12),0 0 8px rgba(219,39,119,.12);background:linear-gradient(135deg,rgba(8,145,178,.05),rgba(219,39,119,.05));}
.card-inner.hl-foto{border:1.5px solid rgba(34,211,238,.4);background:rgba(34,211,238,.06);}
.card-inner.hl-video{border:1.5px solid rgba(244,114,182,.4);background:rgba(244,114,182,.06);}
.card-inner.hl-priority{border:1.5px solid rgba(251,191,36,.4);background:rgba(251,191,36,.06);}
.card-inner.hl-both{border:1.5px solid;border-image:linear-gradient(135deg,rgba(34,211,238,.5),rgba(244,114,182,.5)) 1;background:linear-gradient(135deg,rgba(34,211,238,.04),rgba(244,114,182,.04));}
.hl-badges{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;}
.hl-badge{font-size:9px;font-weight:900;padding:2px 7px;border-radius:4px;letter-spacing:1px;}
.hl-badge.hl-foto{background:rgba(34,211,238,.15);color:#22d3ee;border:1px solid #22d3ee;}
.hl-badge.hl-video{background:rgba(244,114,182,.15);color:#f472b6;border:1px solid #f472b6;}
.hl-badge.hl-priority{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid #fbbf24;}
body.light .hl-badge.hl-foto{color:#0891b2;border-color:#0891b2;background:rgba(8,145,178,.1);}
body.light .hl-badge.hl-video{color:#db2777;border-color:#db2777;background:rgba(219,39,119,.1);}
body.light .hl-badge.hl-priority{color:#d97706;border-color:#d97706;background:rgba(217,119,6,.1);}
.hl-picker{display:flex;gap:8px;flex-wrap:wrap;}
.hl-option{padding:8px 14px;border-radius:8px;border:1.5px solid var(--border2);background:none;color:var(--text4);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;}
.hl-option.active{color:var(--text);background:var(--bg3);}
.hl-option[data-hl="foto"]{border-color:#22d3ee;color:#22d3ee;}
.hl-option[data-hl="foto"].active{background:rgba(34,211,238,.15);}
.hl-option[data-hl="video"]{border-color:#f472b6;color:#f472b6;}
.hl-option[data-hl="video"].active{background:rgba(244,114,182,.15);}
.hl-option[data-hl="priority"]{border-color:#fbbf24;color:#fbbf24;}
.hl-option[data-hl="priority"].active{background:rgba(251,191,36,.15);}
.empty-state{padding:40px 16px;text-align:center;color:var(--text4);font-size:13px;}
.loading{text-align:center;padding:40px;color:var(--text4);font-size:13px;font-weight:600;}
.no-pilots{font-size:12px;color:var(--text4);font-style:italic;padding:8px 0;}
.slot-now{border-color:#22c55e;box-shadow:0 0 0 1px #22c55e;}
.now-badge{font-size:9px;font-weight:900;color:#22c55e;letter-spacing:2px;animation:pulse 2s infinite;}
.search-bar-wrap{padding:0 0 12px 0;}
.search-bar-container{position:relative;}
.search-bar{width:100%;padding:11px 40px 11px 14px;font-family:inherit;font-size:13px;font-weight:700;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);outline:none;}
.search-bar::placeholder{color:var(--text4);font-weight:500;}
.search-bar:focus{border-color:var(--border2);}
.search-clear{background:none;border:none;color:var(--text4);font-size:18px;cursor:pointer;padding:0 4px;position:absolute;right:10px;top:50%;transform:translateY(-50%);}
.search-group-label{font-size:10px;font-weight:800;letter-spacing:2px;color:var(--text4);padding:10px 0 4px;text-transform:uppercase;}
.search-result-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;cursor:pointer;}
.search-result-item:active{opacity:.7;}
.sr-num{font-size:20px;font-weight:900;color:var(--text);min-width:52px;}
.sr-name{font-size:13px;font-weight:700;color:var(--text2);}
.sr-team{font-size:12px;font-weight:700;color:var(--text3);}
.sr-cat{font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;letter-spacing:1px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;}
.modal{background:var(--modal-bg);border-radius:16px 16px 0 0;width:100%;max-width:600px;margin:0 auto;padding:20px;max-height:90vh;overflow-y:auto;border-top:1px solid var(--border);}
.modal-title{font-size:16px;font-weight:900;margin-bottom:16px;color:var(--text);}
.modal-close{float:right;background:none;border:none;color:var(--text4);font-size:20px;cursor:pointer;}
.form-group{margin-bottom:14px;}
.form-label{font-size:10px;font-weight:800;color:var(--text4);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;display:block;}
.form-input{width:100%;background:var(--input-bg);border:1px solid var(--border2);border-radius:8px;padding:11px 12px;font-size:14px;font-weight:600;color:var(--text);outline:none;font-family:inherit;}
.form-select{width:100%;background:var(--input-bg);border:1px solid var(--border2);border-radius:8px;padding:11px 12px;font-size:14px;font-weight:600;color:var(--text);outline:none;font-family:inherit;-webkit-appearance:none;}
.form-textarea{width:100%;background:var(--input-bg);border:1px solid var(--border2);border-radius:8px;padding:11px 12px;font-size:13px;font-weight:500;color:var(--text);outline:none;font-family:inherit;resize:none;min-height:80px;}
.form-submit{width:100%;padding:13px;background:var(--text);color:var(--bg);border:none;border-radius:8px;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;margin-top:8px;letter-spacing:1px;}
.form-delete{width:100%;padding:13px;background:none;color:#ef4444;border:1.5px solid #ef4444;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;}
/* Race selector */
.race-card{border:1px solid var(--border);border-radius:12px;padding:16px;background:var(--bg2);margin-bottom:12px;cursor:pointer;transition:all .15s;}
.race-card:active{opacity:.7;}
.race-card.active-race{border-color:#22c55e;box-shadow:0 0 0 1px #22c55e;}
.race-name{font-size:16px;font-weight:900;color:var(--text);margin-bottom:4px;}
.race-meta{font-size:11px;color:var(--text4);font-weight:600;}
.race-badge{display:inline-block;font-size:9px;font-weight:800;padding:2px 8px;border-radius:4px;letter-spacing:1px;background:#22c55e;color:#000;margin-left:8px;}
.upload-zone{border:2px dashed var(--border2);border-radius:12px;padding:20px;text-align:center;cursor:pointer;margin-bottom:12px;transition:border-color .15s;}
.upload-zone:active{border-color:var(--text);}
.upload-zone-label{font-size:12px;font-weight:700;color:var(--text3);margin-bottom:4px;}
.upload-zone-hint{font-size:10px;color:var(--text4);}
.upload-zone.loaded{border-color:#22c55e;border-style:solid;}
/* Pilot detail sheet */
.detail-sheet{padding:4px 0;}
.detail-actions{display:flex;gap:8px;margin-top:12px;}
.detail-actions button{flex:1;padding:11px;border-radius:8px;font-family:inherit;font-weight:800;font-size:12px;cursor:pointer;letter-spacing:1px;}
.btn-add-pilot{background:#22c55e;color:#000;border:none;}
.btn-note-pilot{background:none;border:1.5px solid var(--border2);color:var(--btn-color);}
/* CAT COLORS */
.cat-kz2{color:#f87171;} body.light .cat-kz2{color:#dc2626;}
.cat-ok{color:#60a5fa;} body.light .cat-ok{color:#2563eb;}
.cat-okj{color:#c084fc;} body.light .cat-okj{color:#7c3aed;}
.cat-gr3{color:#34d399;} body.light .cat-gr3{color:#059669;}
.cat-u10{color:#22d3ee;} body.light .cat-u10{color:#0891b2;}
.cat-nj{color:#fbbf24;} body.light .cat-nj{color:#d97706;}
/* FLOATING NOW BUTTON */
.fab-now{position:fixed;bottom:20px;right:20px;width:48px;height:48px;border-radius:50%;background:#22c55e;color:#000;border:none;font-size:11px;font-weight:900;cursor:pointer;z-index:90;box-shadow:0 4px 12px rgba(0,0,0,.4);font-family:inherit;letter-spacing:1px;display:none;}
.fab-now.visible{display:flex;align-items:center;justify-content:center;}
.fab-top{position:fixed;bottom:76px;right:20px;width:42px;height:42px;border-radius:50%;background:var(--bg2);border:1px solid var(--border2);color:var(--text4);font-size:16px;cursor:pointer;z-index:90;box-shadow:0 2px 8px rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;}
.fab-top.visible{display:flex;}
/* LIVE TIMING IFRAME */
.live-timing-frame{width:100%;height:calc(100vh - 120px);border:none;border-radius:0;background:var(--bg);}
/* IMPROVED TEAM VISIBILITY */
.inner-team-big{font-size:13px;font-weight:800;color:var(--text2);letter-spacing:.5px;}
body.light .inner-team-big{color:var(--text3);}
/* FILTER EXPANDED */
.filter-section{margin-bottom:12px;}
.filter-row{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap;align-items:center;}
.filter-row-label{font-size:9px;font-weight:700;color:var(--text4);letter-spacing:1px;min-width:50px;text-transform:uppercase;}
/* ADVANCED SEARCH */
.adv-search-wrap{margin-bottom:12px;}
.adv-search-mode{display:flex;gap:6px;margin-bottom:8px;overflow-x:auto;scrollbar-width:none;}
.adv-search-mode::-webkit-scrollbar{display:none;}
.adv-mode-btn{padding:6px 12px;border-radius:8px;border:1px solid var(--border2);background:none;color:var(--text4);font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer;font-family:inherit;white-space:nowrap;text-transform:uppercase;}
.adv-mode-btn.active{color:var(--text);border-color:var(--text);background:var(--bg3);}
.adv-cat-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.adv-cat-btn{padding:6px 14px;border-radius:8px;border:1.5px solid var(--border2);background:none;color:var(--text4);font-size:11px;font-weight:800;letter-spacing:1px;cursor:pointer;font-family:inherit;text-transform:uppercase;}
.adv-cat-btn.active{background:var(--bg3);}
.adv-cat-btn.cat-kz2{border-color:#f87171;color:#f87171;}.adv-cat-btn.cat-kz2.active{background:rgba(248,113,113,.12);}
.adv-cat-btn.cat-ok{border-color:#60a5fa;color:#60a5fa;}.adv-cat-btn.cat-ok.active{background:rgba(96,165,250,.12);}
.adv-cat-btn.cat-okj{border-color:#c084fc;color:#c084fc;}.adv-cat-btn.cat-okj.active{background:rgba(192,132,252,.12);}
.adv-cat-btn.cat-gr3{border-color:#34d399;color:#34d399;}.adv-cat-btn.cat-gr3.active{background:rgba(52,211,153,.12);}
.adv-cat-btn.cat-u10{border-color:#22d3ee;color:#22d3ee;}.adv-cat-btn.cat-u10.active{background:rgba(34,211,238,.12);}
.adv-cat-btn.cat-nj{border-color:#fbbf24;color:#fbbf24;}.adv-cat-btn.cat-nj.active{background:rgba(251,191,36,.12);}
body.light .adv-cat-btn.cat-kz2{border-color:#dc2626;color:#dc2626;}
body.light .adv-cat-btn.cat-ok{border-color:#2563eb;color:#2563eb;}
body.light .adv-cat-btn.cat-okj{border-color:#7c3aed;color:#7c3aed;}
body.light .adv-cat-btn.cat-gr3{border-color:#059669;color:#059669;}
body.light .adv-cat-btn.cat-u10{border-color:#0891b2;color:#0891b2;}
body.light .adv-cat-btn.cat-nj{border-color:#d97706;color:#d97706;}
.scuderia-list{max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;margin-top:8px;}
.scuderia-item{padding:10px 14px;font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;border-bottom:1px solid var(--border);}
.scuderia-item:last-child{border-bottom:none;}
.scuderia-item:active{background:var(--bg3);}
.scuderia-item.selected{background:rgba(96,165,250,.1);color:#60a5fa;}
body.light .scuderia-item.selected{color:#2563eb;background:rgba(37,99,235,.08);}
/* ENTRY LIST TAB */
.entry-list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.entry-count-badge{font-size:11px;font-weight:700;color:var(--text4);padding:4px 10px;border:1px solid var(--border);border-radius:6px;letter-spacing:1px;}
.entry-cat-filter{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.entry-cat-filter::-webkit-scrollbar{display:none;}
.entry-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;cursor:pointer;}
.entry-item.is-mine{border-color:#22c55e;background:rgba(34,197,94,.05);}
.entry-item:active{opacity:.7;}
.entry-num{font-size:18px;font-weight:900;color:var(--text);min-width:48px;}
.entry-name{font-size:13px;font-weight:700;color:var(--text2);}
.entry-team{font-size:12px;font-weight:700;color:var(--text3);}
.entry-badges{display:flex;flex-direction:column;align-items:flex-end;gap:4px;margin-left:auto;}
@media(min-width:768px){
  .content{max-width:800px;margin:0 auto;}
  .card{transition:border-color .15s;}.card:hover{border-color:var(--border2);}
  .task-btn:hover{opacity:.8;}
  .track-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));}
  /* Fix PC scroll in programma */
  #tab-programma .content,#tab-programma #schedule-content{overflow-y:auto;}
}
</style>
</head>

import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,set,onValue,update,off}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const firebaseConfig={apiKey:"AIzaSyB2t6Rm0x-LIMD8iWF_cAUXzdsBUCz6Byg",authDomain:"karting-tools.firebaseapp.com",databaseURL:"https://karting-tools-default-rtdb.firebaseio.com",projectId:"karting-tools",storageBucket:"karting-tools.firebasestorage.app",messagingSenderId:"199360301984",appId:"1:199360301984:web:50252111fe9b47231232c5"};
const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

// ── CONSTANTS ──
const TASKS=["PADDOK","PREGRIGLIA","BILANCIA","PISTA","REPORTAGE"];

// ── DEBUG LOGGING (must be defined early) ──
let debugLogs=[];
function dlog(msg,type){
  type=type||'info';
  debugLogs.push({time:new Date().toLocaleTimeString(),msg,type});
  renderDebugLogs();
}
function renderDebugLogs(){
  const el=document.getElementById('debug-logs');if(!el)return;
  el.innerHTML=debugLogs.map(l=>{
    const colors={ok:'#22c55e',err:'#ef4444',warn:'#fbbf24',info:'var(--text4)'};
    const borderColors={ok:'#16a34a',err:'#dc2626',warn:'#d97706',info:'var(--border)'};
    return'<div style="background:var(--bg3);border:1px solid '+borderColors[l.type]+';border-radius:8px;padding:10px;margin-bottom:6px;font-size:11px;color:'+colors[l.type]+';word-break:break-all">'+l.time+' — '+l.msg+'</div>';
  }).join('');
  el.scrollTop=el.scrollHeight;
}
function renderDebug(){renderDebugLogs();}

// ── DEFAULT DATA (WSK Super Master Franciacorta — used as fallback) ──
const DAYS=["MERCOLEDÌ","GIOVEDÌ","VENERDÌ","SABATO","DOMENICA"];
const SCHEDULE={
  "MERCOLEDÌ":[
    {time:"8.00",cat:"KZ2",label:"KZ2",session:"PROVE LIBERE — Turno 1",type:"parity",filter:"ODD"},

// User from URL param ?user=name or localStorage fallback
function getUserId(){
  const params=new URLSearchParams(window.location.search);
  const urlUser=params.get('user');
  if(urlUser){localStorage.setItem('rt_user',urlUser);return urlUser.toLowerCase().trim();}

}
let currentUserId=getUserId();

function listenRaceData(raceId){
  if(raceDataUnsub) raceDataUnsub();
  if(!currentUserId){initialized=true;renderAll();return;}
  
  const sharedRef=ref(db,'races/'+raceId);
  const userRef=ref(db,'races/'+raceId+'/users/'+currentUserId);
  let sharedData={};let userData={};let sharedReady=false;let userReady=false;

  function mergeAndRender(){
    if(!sharedReady||!userReady)return;
    currentEntryList=sharedData.entryList||{};
    currentSchedule=sharedData.schedule||{};
    currentDays=sharedData.days||Object.keys(currentSchedule);
    currentFinals=sharedData.finals||[];
    trackSections=sharedData.trackSections||["PARTENZA","CURVA 1","RETTILINEO 1","CURVA 2","ESSE","RETTILINEO 2","ARRIVO"];
    pilots=userData.pilots?Object.values(userData.pilots):[];
    statuses=userData.statuses||{};
    notes=userData.notes||{};
    trackStatus=userData.trackStatus||{};
    pilots.forEach(p=>{
      if(!p.group)p.group='';if(!p.prefinal)p.prefinal='';if(!p.serie)p.serie='';if(!p.eliminated)p.eliminated=false;
      if(!p.heats)p.heats=[];
      if(!p.inFinal)p.inFinal=false;  // nuovo campo — array di coppie heat es. ["A-B","A-D"]
      if(!statuses[p.num])statuses[p.num]={};
      TASKS.forEach(t=>{if(!statuses[p.num][t])statuses[p.num][t]='red';});
      if(!trackStatus[p.num])trackStatus[p.num]={};
      if(notes[p.num]===undefined)notes[p.num]='';
    });
    if(!activeDay||!currentDays.includes(activeDay)) activeDay=currentDays[0]||'';
    setSyncStatus('ok');
    initialized=true;
    renderAll();
  }

  const unsub1=onValue(sharedRef,snap=>{
    sharedData=snap.val()||{};
    dlog('Dati gara condivisi: entryList='+Object.keys(sharedData.entryList||{}).length+', days='+(sharedData.days||[]).length,'ok');
    sharedReady=true;
    mergeAndRender();
  },err=>{setSyncStatus('err');dlog('❌ shared data: '+err.message,'err');});

  const unsub2=onValue(userRef,snap=>{
    userData=snap.val()||{};
    dlog('Dati utente ['+currentUserId+']: pilots='+Object.keys(userData.pilots||{}).length,'ok');
    userReady=true;
    mergeAndRender();
  },err=>{setSyncStatus('err');dlog('❌ user data: '+err.message,'err');});

  raceDataUnsub=()=>{off(sharedRef);off(userRef);};
}

function cycleStatus(cur){const i=STATUS_CYCLE.indexOf(cur);return STATUS_CYCLE[(i+1)%STATUS_CYCLE.length];}

// ── GROUP HELPERS ──
// Normalizza qualsiasi valore gruppo in una singola lettera maiuscola ('A'-'E')
// oppure '' se il valore non è valido.
const VALID_GROUPS=['A','B','C','D','E'];
function normalizeGroup(v){
  if(!v&&v!==0)return'';
  const s=String(v).trim().toUpperCase();
  return VALID_GROUPS.includes(s)?s:'';
}
// Restituisce true se il pilota appartiene a uno dei gruppi nell'array filterArr
// filterArr è sempre un array di lettere, es. ['A','B']
function pilotInGroup(pilot,filterArr){
  // NUOVO: se il pilota ha heats[], controlla se questa coppia di gruppi è nella lista
  // es. filterArr=['A','B'] → cerca 'A-B' in pilot.heats
  if(pilot.heats&&Array.isArray(pilot.heats)&&pilot.heats.length){
    const slotKey=filterArr.map(x=>String(x).trim().toUpperCase()).sort().join('-');
    return pilot.heats.some(h=>{
      const hKey=String(h).trim().toUpperCase().split('-').map(x=>x.trim()).sort().join('-');
      return hKey===slotKey;
    });
  }
  // FALLBACK LEGACY: usa group singolo
  const g=normalizeGroup(pilot.group);
  if(!g)return false;
  return filterArr.map(x=>String(x).trim().toUpperCase()).includes(g);
}

// Indica se il pilota ha dati gruppo validi (heats[] nuovo o group legacy)
function pilotHasGroupData(pilot){
  if(pilot.heats&&Array.isArray(pilot.heats)&&pilot.heats.length)return true;
  return!!normalizeGroup(pilot.group);
}

function pilotsForSlot(slot){
  return pilots.filter(p=>{
    if(p.eliminated)return false;
    if(p.cat!==slot.cat)return false;
    if(slot.type==='all')return true;
    if(slot.type==='parity')return p.parity===slot.filter;
    if(slot.type==='serie'){if(!p.serie)return false;return String(p.serie).trim()===String(slot.filter).trim();}
    if(slot.type==='group')return pilotInGroup(p,slot.filter);
    if(slot.type==='prefinal'){if(!p.prefinal)return false;return String(p.prefinal).trim().toUpperCase()===String(slot.filter).trim().toUpperCase();}
    return false;
  });
}
// Pilots of a category that are missing the required assignment for a slot type
function pilotsAwaitingData(slot){
  return pilots.filter(p=>{
    if(p.eliminated)return false;
    if(p.cat!==slot.cat)return false;
    if(slot.type==='serie'&&!String(p.serie||'').trim())return true;
    if(slot.type==='group'&&!pilotHasGroupData(p))return true;
    if(slot.type==='prefinal'&&!String(p.prefinal||'').trim())return true;
    return false;
  });
}
function slotFilterLabel(slot){
  if(slot.type==='parity')return slot.filter;
  if(slot.type==='serie')return'SERIE '+slot.filter;
  if(slot.type==='group')return'GRP '+slot.filter.join('+');
  if(slot.type==='prefinal')return'PREF '+slot.filter;
  return'ALL';
}

      const data=JSON.parse(e.target.result);
      if(data.pilots)pilots=Array.isArray(data.pilots)?data.pilots:Object.values(data.pilots);
      if(data.statuses)statuses=data.statuses;
      if(data.notes)notes=data.notes;
      if(data.trackSections)trackSections=data.trackSections;
      if(data.trackStatus)trackStatus=data.trackStatus;

function renderGare(){
  const el=document.getElementById('gare-content');
  const raceIds=Object.keys(races);
  let html='<div style="margin-bottom:16px">'
    +'<button class="mgmt-btn" onclick="openNewRace()" style="border-color:#22c55e;color:#22c55e">+ NUOVA GARA</button></div>';

  if(!raceIds.length){
    html+='<div class="empty-state"><p>Nessuna gara. Creane una!</p><p style="margin-top:8px;font-size:11px">Oppure i dati della gara WSK attuale verranno migrati automaticamente.</p></div>';
  } else {
    // Sort by startDate (earliest first), races without dates go to end
    const sorted=raceIds.map(id=>({id,...races[id]})).sort((a,b)=>{
      const da=a.startDate||'9999';const db2=b.startDate||'9999';
      return da.localeCompare(db2);
    });

    const today=new Date().toISOString().split('T')[0];
    let closestIdx=-1;let closestDiff=Infinity;

    html+='<div style="font-size:10px;color:var(--text4);font-weight:700;letter-spacing:1px;margin-bottom:10px">'+raceIds.length+' GARE</div>';
    sorted.forEach((r,idx)=>{
      const id=r.id;
      const isActive=id===activeRaceId;
      const entryCount=r.entryCount||0;
      const pilotCount=isActive?pilots.length:(r.pilotCount||0);
      const startD=r.startDate||'';
      const endD=r.endDate||'';

      // Find closest race to today for auto-scroll
      if(startD){
        const diff=Math.abs(new Date(startD)-new Date(today));
        // Prefer ongoing races (today between start and end)
        const isOngoing=startD<=today&&(endD>=today||!endD);
        if(isOngoing){closestIdx=idx;closestDiff=-1;}
        else if(closestDiff>0&&diff<closestDiff){closestDiff=diff;closestIdx=idx;}
      }

      // Format dates
      let dateStr='';
      if(startD&&endD){
        const s=formatDateShort(startD);const e=formatDateShort(endD);
        dateStr=s+' → '+e;
      } else if(startD){
        dateStr='Dal '+formatDateShort(startD);
      }

      // Is this race ongoing?
      const isOngoing=startD&&startD<=today&&(endD>=today||!endD);

      html+='<div class="race-card'+(isActive?' active-race':'')+'" id="race-card-'+idx+'" onclick="switchRaceAndRender(\''+id+'\')">'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-start">'
        +'<div><div class="race-name">'+r.name+(isActive?'<span class="race-badge">ATTIVA</span>':'')+'</div>'
        +'<div class="race-meta">'+(r.circuit||'')+(dateStr?' · '+dateStr:'')+'</div>'
        +'<div class="race-meta" style="margin-top:2px">'+pilotCount+' miei piloti · '+entryCount+' in entry list</div></div>'
        +(isOngoing?'<span style="font-size:9px;font-weight:800;color:#22c55e;border:1px solid #22c55e;padding:2px 8px;border-radius:4px;white-space:nowrap">IN CORSO</span>':'')
        +'</div>'
        +'<div style="display:flex;gap:6px;margin-top:10px">'
        +'<button class="io-btn" style="font-size:10px;padding:8px" onclick="event.stopPropagation();openRaceSettings(\''+id+'\')">⚙ IMPOSTAZIONI</button>'
        +(isActive?'':'<button class="io-btn" style="font-size:10px;padding:8px;border-color:#ef4444;color:#ef4444" onclick="event.stopPropagation();deleteRace(\''+id+'\')">✕ ELIMINA</button>')
        +'</div></div>';
    });

    // Auto-scroll to closest race
    if(closestIdx>=0){
      setTimeout(()=>{
        const card=document.getElementById('race-card-'+closestIdx);
        if(card)card.scrollIntoView({behavior:'smooth',block:'center'});
      },100);
    }
  }
  el.innerHTML=html;
}

function formatDateShort(dateStr){
  if(!dateStr)return'';
  const d=new Date(dateStr+'T00:00:00');
  const months=['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  return d.getDate()+' '+months[d.getMonth()];
}

  openModal('<button class="modal-close" onclick="closeModal()">✕</button>'
    +'<div class="modal-title">📥 Incolla Heats da WSK</div>'
    +'<div style="font-size:11px;color:var(--text4);margin-bottom:14px;line-height:1.6">'

    +'3. Aspetta qualche secondo, poi incolla qui sotto</div>'
    +'<div class="form-group"><label class="form-label">JSON copiato dal bookmarklet</label>'
    +'<textarea class="form-textarea" id="wsk-paste-input" placeholder=\'[{"num":"563","heats":["B-C","B-D"]}, ...]\' style="min-height:120px;font-size:11px"></textarea></div>'
    +'<button class="form-submit" onclick="applyWSKHeats(\''+raceId+'\')">✅ APPLICA</button>');
  // Prova a leggere dagli appunti automaticamente
  navigator.clipboard.readText().then(text=>{
    if(text&&text.trim().startsWith('[')){
      const el=document.getElementById('wsk-paste-input');
      if(el)el.value=text.trim();
    }
  }).catch(()=>{});
}

function applyWSKHeats(raceId){
  const el=document.getElementById('wsk-paste-input');
  if(!el||!el.value.trim()){alert('Incolla il JSON prima');return;}
  try{
    const data=JSON.parse(el.value.trim());
    if(!Array.isArray(data))throw new Error('Formato non valido');
    // Usa uploadAssignments logic direttamente
    const assignMap={};
    data.forEach(a=>{
      const num=a.num?a.num.toString():'';
      if(num&&a.heats)assignMap[num]=a;
    });
    let updated=0;let notFound=0;
    pilots.forEach(p=>{
      const a=assignMap[p.num];
      if(a){
        if(a.heats&&a.heats.length){p.heats=a.heats.map(h=>String(h).trim().toUpperCase());p.group='';}
        if(a.prefinal!==undefined)p.prefinal=a.prefinal;
        if(a.inFinal!==undefined)p.inFinal=a.inFinal;
        updated++;
      } else {
        notFound++;
      }
    });
    // Aggiorna entry list condivisa
    const entryUpdates={};
    data.forEach(a=>{
      const anum=a.num?a.num.toString():'';
      if(anum&&currentEntryList[anum]&&a.heats){
        entryUpdates['races/'+raceId+'/entryList/'+anum+'/heats']=a.heats.map(h=>String(h).trim().toUpperCase());
        entryUpdates['races/'+raceId+'/entryList/'+anum+'/group']='';
      }
    });
    if(Object.keys(entryUpdates).length)update(ref(db),entryUpdates);
    saveAll();
    alert('✅ Heats aggiornate!\n'+updated+' tuoi piloti aggiornati'+(notFound?' ('+notFound+' non trovati tra i tuoi piloti)':''));
    closeModal();
  }catch(e){alert('❌ JSON non valido: '+e.message);}
}
window.applyWSKHeats=applyWSKHeats;

function uploadEntryList(event,raceId){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      // Accept either {num:{...}} or [{num,lastName,...}]
      let entryList={};
      if(Array.isArray(data)){
        data.forEach(d=>{if(d.num)entryList[d.num.toString()]=d;});
      } else {
        entryList=data;
      }
      const count=Object.keys(entryList).length;
      const u={};
      u['races/'+raceId+'/entryList']=entryList;
      u['races_index/'+raceId+'/entryCount']=count;
      update(ref(db),u).then(()=>{alert('✅ Entry list caricata: '+count+' piloti');closeModal();});
    }catch(err){alert('❌ File non valido');}
  };
  reader.readAsText(file);event.target.value='';
}
window.uploadEntryList=uploadEntryList;

function uploadMyPilots(event,raceId){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      // Accept [{num, serie?, group?, ...}] or {num:{...}}
      let pilotsList=[];
      if(Array.isArray(data)){
        pilotsList=data;
      } else {
        pilotsList=Object.values(data);
      }
      // For each pilot, look up in entry list to fill details
      const pilotsObj={};const newStatuses={};const newNotes={};const newTrack={};
      // First fetch current entry list
      fetch('https://karting-tools-default-rtdb.firebaseio.com/races/'+raceId+'/entryList.json')
        .then(r=>r.json()).then(el=>{
          el=el||{};
          pilotsList.forEach(mp=>{
            const num=mp.num?mp.num.toString():(mp.number?mp.number.toString():'');
            if(!num)return;
            const entry=el[num]||{};
            const name=mp.name||(entry.lastName&&entry.firstName?entry.lastName+' '+entry.firstName:'')||'';
            const team=mp.team||entry.team||'';
            const cat=mp.cat||entry.cat||'OK';
            pilotsObj[num]={num,name:name.toUpperCase(),team:team.toUpperCase(),cat,parity:autoParity(num),group:mp.group||'',prefinal:mp.prefinal||'',serie:mp.serie?mp.serie.toString():''};
            newStatuses[num]={};TASKS.forEach(t=>newStatuses[num][t]='red');
            newNotes[num]=mp.notes||'';
            newTrack[num]={};
          });
          const count=Object.keys(pilotsObj).length;
          const u={};
          u['races/'+raceId+'/users/'+currentUserId+'/pilots']=pilotsObj;
          u['races/'+raceId+'/users/'+currentUserId+'/statuses']=newStatuses;
          u['races/'+raceId+'/users/'+currentUserId+'/notes']=newNotes;
          u['races/'+raceId+'/users/'+currentUserId+'/trackStatus']=newTrack;
          u['races_index/'+raceId+'/pilotCount']=count;
          update(ref(db),u).then(()=>{alert('✅ '+count+' piloti caricati');closeModal();});
        });
    }catch(err){alert('❌ File non valido');}
  };
  reader.readAsText(file);event.target.value='';
}
window.uploadMyPilots=uploadMyPilots;

function uploadSchedule(event,raceId){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      // Accept {days:[], schedule:{}, finals:[]} or just {DAY_NAME:[slots...]}
      let schedule,days,finals;
      if(data.schedule){
        schedule=data.schedule;days=data.days||Object.keys(data.schedule);finals=data.finals||[];
      } else {
        schedule=data;days=Object.keys(data);finals=[];
      }
      const u={};
      u['races/'+raceId+'/schedule']=schedule;
      u['races/'+raceId+'/days']=days;
      u['races/'+raceId+'/finals']=finals;
      update(ref(db),u).then(()=>{alert('✅ Programma caricato: '+days.length+' giorni');closeModal();});
    }catch(err){alert('❌ File non valido');}
  };
  reader.readAsText(file);event.target.value='';
}
window.uploadSchedule=uploadSchedule;

// Upload assignments: updates heats[]/group/serie/prefinal for existing pilots
// NUOVO formato: [{num:"342", heats:["A-B","A-D"]}, ...]
// LEGACY formato: [{num:"342", group:"A", serie:"1", prefinal:"B"}, ...]
// heats[] è un array di coppie es. ["B-D","B-C"] — il pilota compare in quegli slot
function uploadAssignments(event,raceId){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      let assignments=[];
      if(Array.isArray(data)){
        assignments=data;
      } else {
        assignments=Object.entries(data).map(([num,v])=>({num,...v}));
      }

      const assignMap={};
      const hasHeats=assignments.some(a=>a.heats!==undefined);
      const hasGroup=assignments.some(a=>a.group!==undefined);
      const hasSerie=assignments.some(a=>a.serie!==undefined);
      const hasPrefinal=assignments.some(a=>a.prefinal!==undefined);

      assignments.forEach(a=>{
        const num=a.num?a.num.toString():(a.number?a.number.toString():'');
        if(num)assignMap[num]=a;
      });

      let updated=0;let eliminated=0;let reactivated=0;

      pilots.forEach(p=>{
        const a=assignMap[p.num];
        if(a){
          // NUOVO: heats[] — array di coppie es. ["B-D","B-C"]
          if(a.heats!==undefined){
            p.heats=Array.isArray(a.heats)
              ?a.heats.map(h=>String(h).trim().toUpperCase())
              :[String(a.heats).trim().toUpperCase()];
            // Resetta group legacy per evitare conflitti
            p.group='';
          }
          // LEGACY: group singolo
          if(a.group!==undefined&&a.heats===undefined)p.group=a.group.toString().toUpperCase();
          if(a.serie!==undefined)p.serie=a.serie.toString();
          if(a.prefinal!==undefined)p.prefinal=a.prefinal.toString().toUpperCase();
          if(p.eliminated){p.eliminated=false;reactivated++;}
          updated++;
        } else {
          const catAssignments=assignments.filter(aa=>{
            const anum=aa.num?aa.num.toString():'';
            const entry=currentEntryList[anum];
            return entry&&entry.cat===p.cat;
          });
          if(catAssignments.length>0&&!p.eliminated){
            p.eliminated=true;
            eliminated++;
          }
        }
      });

      // Aggiorna entry list condivisa
      const entryUpdates={};
      assignments.forEach(a=>{
        const anum=a.num?a.num.toString():(a.number?a.number.toString():'');
        if(anum&&currentEntryList[anum]){
          if(a.heats!==undefined){
            entryUpdates['races/'+raceId+'/entryList/'+anum+'/heats']=
              Array.isArray(a.heats)?a.heats.map(h=>String(h).trim().toUpperCase()):[String(a.heats).trim().toUpperCase()];
            entryUpdates['races/'+raceId+'/entryList/'+anum+'/group']='';
          }
          if(a.group!==undefined&&a.heats===undefined)entryUpdates['races/'+raceId+'/entryList/'+anum+'/group']=a.group.toString().toUpperCase();
          if(a.serie!==undefined)entryUpdates['races/'+raceId+'/entryList/'+anum+'/serie']=a.serie.toString();
          if(a.prefinal!==undefined)entryUpdates['races/'+raceId+'/entryList/'+anum+'/prefinal']=a.prefinal.toString().toUpperCase();
        }
      });
      if(Object.keys(entryUpdates).length)update(ref(db),entryUpdates);

      saveAll();
      let msg='✅ Assegnazioni aggiornate!\n'+updated+' piloti aggiornati';
      if(hasHeats)msg+='\n(formato heats[] — corrispondenza slot precisa)';
      else if(hasGroup)msg+='\n(formato group legacy)';
      if(eliminated)msg+='\n'+eliminated+' piloti eliminati (non in lista)';
      if(reactivated)msg+='\n'+reactivated+' piloti riattivati';
      alert(msg);
      closeModal();
    }catch(err){alert('❌ File non valido: '+err.message);}
  };
  reader.readAsText(file);event.target.value='';
}

function filterPilots(q){
  const resultsEl=document.getElementById('pilots-search-results');
  const listEl=document.getElementById('pilots-list');
  const clearBtn=document.getElementById('search-clear-btn');
  if(!q||!q.trim()){resultsEl.style.display='none';listEl.style.display='';if(clearBtn)clearBtn.style.display='none';return;}
  if(clearBtn)clearBtn.style.display='block';
  listEl.style.display='none';resultsEl.style.display='';
  const query=q.trim().toUpperCase();
  const matches=[];
  Object.entries(currentEntryList).forEach(([num,e])=>{
    const nameStr=((e.lastName||'')+' '+(e.firstName||'')).toUpperCase();
    const teamStr=(e.team||'').toUpperCase();
    if(num.startsWith(query)||nameStr.includes(query)||teamStr.includes(query)){
      matches.push({num,name:(e.lastName||'')+' '+(e.firstName||''),team:e.team||'',cat:e.cat||'',parity:e.parity||autoParity(num),isMyPilot:!!pilots.find(p=>p.num===num)});
    }
  });
  if(!matches.length){resultsEl.innerHTML='<div class="empty-state"><p>Nessun risultato</p></div>';return;}
  matches.sort((a,b)=>{if(a.isMyPilot&&!b.isMyPilot)return-1;if(!a.isMyPilot&&b.isMyPilot)return 1;return a.team.localeCompare(b.team)||parseInt(a.num)-parseInt(b.num);});
  const myP=matches.filter(m=>m.isMyPilot);
  const others=matches.filter(m=>!m.isMyPilot);
  const otherGroups={};
  others.forEach(m=>{if(!otherGroups[m.team])otherGroups[m.team]=[];otherGroups[m.team].push(m);});
  let html='<div style="font-size:10px;color:var(--text4);font-weight:700;letter-spacing:1px;margin-bottom:8px">'+matches.length+' RISULTATI</div>';
  if(myP.length){
    html+='<div class="search-group-label" style="color:#22c55e">★ I MIEI PILOTI ('+myP.length+')</div>';
    myP.forEach(m=>{html+=searchResultItem(m);});
  }
  Object.entries(otherGroups).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([team,members])=>{
    html+='<div class="search-group-label">'+team+' ('+members.length+')</div>';
    members.sort((a,b)=>parseInt(a.num)-parseInt(b.num)).forEach(m=>{html+=searchResultItem(m);});
  });
  resultsEl.innerHTML=html;
}
function searchResultItem(m){
  const catCls=catClass(m.cat);const isMine=m.isMyPilot;
  return'<div class="search-result-item" style="'+(isMine?'border-color:#22c55e;background:rgba(34,197,94,.06)':'')+'" onclick="openPilotDetail(\''+m.num+'\')">'
    +'<span class="sr-num" style="'+(isMine?'color:#22c55e':'')+'">#'+m.num+'</span>'
    +'<div style="flex:1;min-width:0">'
    +'<div class="sr-name">'+m.name+(isMine?' <span style="font-size:10px;color:#22c55e;font-weight:800">★ TUO</span>':'')+'</div>'
    +'<div class="sr-team">'+m.team+'</div></div>'
    +'<span class="sr-cat '+catCls+'" style="padding:2px 7px;border-radius:6px;font-size:10px;font-weight:800">'+m.cat+'</span></div>';
}

function buildProgResultsHtml(fakePilots){
  const slots=currentSchedule[activeDay]||[];
  let html='';
  slots.forEach(slot=>{
    const ps=fakePilots.filter(p=>{
      if(p.cat!==slot.cat)return false;
      if(slot.type==='all')return true;
      if(slot.type==='parity')return p.parity===slot.filter;
      if(slot.type==='serie'){if(!p.serie)return false;return String(p.serie).trim()===String(slot.filter).trim();}
      if(slot.type==='group')return pilotInGroup(p,slot.filter);
      if(slot.type==='prefinal'){if(!p.prefinal)return false;return String(p.prefinal).trim().toUpperCase()===String(slot.filter).trim().toUpperCase();}
      return false;
    });
    if(!ps.length)return;
    html+='<div class="card" style="margin-bottom:8px"><div class="slot-header">'
      +'<span class="slot-time">'+slot.time+'</span>'
      +'<span class="slot-label '+catClass(slot.cat)+'">'+slot.label+'</span>'
      +'<span class="slot-type">'+slotFilterLabel(slot)+'</span></div><div style="margin-top:8px">';
    ps.forEach(p=>{
      const isMine=!!pilots.find(x=>x.num===p.num);

        +'<span class="inner-num" style="'+(isMine?'color:#22c55e':'')+'">#'+p.num+'</span>'
        +'<span class="inner-name">'+p.name+(isMine?' <span style="font-size:9px;color:#22c55e;font-weight:800">★</span>':'')+'</span>'
        +'<span class="inner-team-big">'+p.team+'</span></div></div>';
    });
    html+='</div></div>';
  });
  if(!html)return'<div class="empty-state"><p>Nessuno in programma per oggi</p></div>';
  return'<div style="font-size:10px;color:var(--text4);font-weight:700;letter-spacing:1px;margin-bottom:8px">'+fakePilots.length+' PILOTI NEL PROGRAMMA DI '+activeDay+'</div>'+html;
}

function renderEntryList(){
  if(!initialized)return;
  const el=document.getElementById('entry-list-content');if(!el)return;
  const totalBadge=document.getElementById('entry-total-badge');

  const entries=Object.entries(currentEntryList);
  if(!entries.length){
    if(totalBadge)totalBadge.textContent='0 PILOTI';
    el.innerHTML='<div class="empty-state"><p>Nessuna entry list caricata.</p><p style="margin-top:8px;font-size:11px">Vai in GARE → Impostazioni per caricare la entry list.</p></div>';
    return;
  }

  // Filter
  let filtered=entries;
  if(elSearchMode==='text'){
    const q=(document.getElementById('el-search-input')?document.getElementById('el-search-input').value.trim().toUpperCase():'');
    const clr=document.getElementById('el-search-clear');
    if(clr)clr.style.display=q?'block':'none';
    if(q){filtered=filtered.filter(([num,e])=>{
      const nameStr=((e.lastName||'')+' '+(e.firstName||'')).toUpperCase();
      return num.startsWith(q)||nameStr.includes(q)||(e.team||'').toUpperCase().includes(q);
    });}
  } else if(elSearchMode==='team'){
    if(elSearchTeam)filtered=filtered.filter(([,e])=>e.team===elSearchTeam);
    else {
      el.innerHTML='<div style="font-size:11px;color:var(--text4);padding:10px 0;text-align:center">Seleziona una scuderia dalla lista</div>';
      return;
    }
  } else if(elSearchMode==='cat'){
    if(elSearchCat)filtered=filtered.filter(([,e])=>e.cat===elSearchCat);
  }

  // Sort: by cat order then by number
  const catOrder={'KZ2':0,'OK':1,'OKJ':2,'MINI GR3':3,'MINI U10':4,'OK-NJ':5};
  filtered.sort((a,b)=>{
    const ca=catOrder[a[1].cat]??9;const cb=catOrder[b[1].cat]??9;
    if(ca!==cb)return ca-cb;
    return parseInt(a[0])-parseInt(b[0]);
  });

  if(totalBadge)totalBadge.textContent=filtered.length+' PILOTI'+(filtered.length<entries.length?' / '+entries.length+' TOT':'');

  // Group by cat for display
  const groups={};
  filtered.forEach(([num,e])=>{
    const cat=e.cat||'?';
    if(!groups[cat])groups[cat]=[];
    groups[cat].push({num,...e});
  });

  let html='';
  Object.entries(groups).forEach(([cat,members])=>{
    const catCls=catClass(cat);
    html+='<div style="font-size:14px;font-weight:900;letter-spacing:2px;padding:14px 0 6px;border-top:1px solid var(--border);margin-top:6px">'
      +'<span class="'+catCls+'">'+cat+'</span>'
      +' <span style="font-size:11px;font-weight:600;color:var(--text4)">'+members.length+'</span></div>';
    members.forEach(p=>{
      const isMine=!!pilots.find(x=>x.num===p.num);
      html+='<div class="entry-item'+(isMine?' is-mine':'')+'" onclick="openPilotDetail(\''+p.num+'\')">'
        +'<span class="entry-num" style="'+(isMine?'color:#22c55e':'')+'">#'+p.num+'</span>'
        +'<div style="flex:1;min-width:0">'
        +'<div class="entry-name">'+(p.lastName||'')+' '+(p.firstName||'')+(isMine?' <span style="font-size:9px;color:#22c55e;font-weight:800">★ TUO</span>':'')+'</div>'
        +'<div class="entry-team">'+( p.team||'')+'</div></div>'
        +'<div class="entry-badges">'
        +'<span style="font-size:9px;font-weight:700;color:var(--text4);padding:2px 6px;border:1px solid var(--border);border-radius:4px">'+( p.parity||autoParity(p.num))+'</span>'
        +(p.group?'<span style="font-size:9px;font-weight:900;color:#60a5fa;padding:2px 6px;border:1px solid #60a5fa;border-radius:4px">GRP '+p.group+'</span>':'')
        +'</div></div>';
    });
  });

  if(!html)html='<div class="empty-state"><p>Nessun risultato</p></div>';
  el.innerHTML=html;
}
window.renderEntryList=renderEntryList;

let scheduleDelay=parseInt(localStorage.getItem('rt_delay')||'0');

function setDelay(d){
  scheduleDelay=parseInt(d)||0;
  localStorage.setItem('rt_delay',scheduleDelay);
  const el=document.getElementById('delay-display');
  if(el)el.textContent=(scheduleDelay>0?'+':'')+scheduleDelay+' min';
  scheduleNeedsScroll=true;
  renderSchedule();
}

function editDelayManual(){
  const val=prompt('Inserisci ritardo in minuti (negativo se in anticipo):', scheduleDelay);
  if(val===null)return;
  const n=parseInt(val);
  if(!isNaN(n))setDelay(n);
}
window.editDelayManual=editDelayManual;

function getCurrentSlotIndex(slots){
  const now=new Date();
  const nowMins=now.getHours()*60+now.getMinutes()-scheduleDelay;
  let closest=-1;let closestDiff=Infinity;
  for(let i=0;i<slots.length;i++){
    const parts=slots[i].time.split('.');
    const slotMins=parseInt(parts[0])*60+parseInt(parts[1]);
    const diff=nowMins-slotMins;
    if(diff>=0&&diff<closestDiff){closestDiff=diff;closest=i;}
  }
  return closest===-1?0:closest;
}

function renderSchedule(){
  const dt=document.getElementById('day-tabs');
  dt.innerHTML=currentDays.map(d=>'<button class="day-tab '+(d===activeDay?'active':'')+'" onclick="setDay(\''+d+'\')">'+d+'</button>').join('');
  const el=document.getElementById('schedule-content');
  if(!initialized){el.innerHTML='<div class="loading">Caricamento…</div>';return;}
  if(!currentDays.length){el.innerHTML='<div class="empty-state"><p>Nessun programma caricato.<br>Vai in GARE → Impostazioni per caricare il programma.</p></div>';return;}
  const slots=currentSchedule[activeDay];
  if(!slots){el.innerHTML='<div class="empty-state"><p>Nessun programma per questo giorno</p></div>';return;}
  const currentIdx=getCurrentSlotIndex(slots);
  let html='';let lastSession='';
  slots.forEach((slot,idx)=>{
    const ps=pilotsForSlot(slot);const isNow=idx===currentIdx;
    const awaiting=pilotsAwaitingData(slot);
    if(slot.session&&slot.session!==lastSession){html+='<div class="session-divider">'+slot.session+'</div>';lastSession=slot.session;}

    // No pilots matched AND some are waiting for data assignment
    if(!ps.length&&awaiting.length){
      const typeLabel=slot.type==='serie'?'serie':slot.type==='group'?'gruppo':slot.type==='prefinal'?'prefinal':'';
      html+='<div class="card'+(isNow?' slot-now':'')+'" style="opacity:.35;padding:10px 14px" '+(isNow?'id="slot-now"':'')+'>'
        +'<div style="display:flex;align-items:center;gap:8px">'
        +'<span style="font-size:13px;font-weight:900;color:var(--text4)">'+slot.time+'</span>'
        +'<span class="'+catClass(slot.cat)+'" style="font-size:10px;font-weight:800">'+slot.label+'</span>'
        +'<span style="font-size:9px;color:#fbbf24;font-weight:700;margin-left:auto;letter-spacing:1px">⏳ ATTESA '+typeLabel.toUpperCase()+'</span>'
        +'</div></div>';
      return;
    }

    // No pilots at all for this slot
    if(!ps.length){
      html+='<div class="card'+(isNow?' slot-now':'')+'" style="opacity:.45" '+(isNow?'id="slot-now"':'')+'><div class="slot-header">'
        +'<span class="slot-time">'+slot.time+'</span>'+(isNow?'<span class="now-badge">ORA</span>':'')
        +'<span class="slot-label '+catClass(slot.cat)+'">'+slot.label+'</span>'
        +'<span class="slot-type">'+slotFilterLabel(slot)+'</span></div>'
        +'<div style="font-size:11px;font-weight:700;color:var(--text4);padding:2px 0">— NESSUNO —</div></div>';
      return;
    }

    // Has pilots — show them, plus warning if some are still awaiting
    html+='<div class="card'+(isNow?' slot-now':'')+'" '+(isNow?'id="slot-now"':'')+'><div class="slot-header">'
      +'<span class="slot-time">'+slot.time+'</span>'+(isNow?'<span class="now-badge">ORA</span>':'')
      +'<span class="slot-label '+catClass(slot.cat)+'">'+slot.label+'</span>'
      +'<span class="slot-type">'+slotFilterLabel(slot)+'</span></div>'
      +(awaiting.length?'<div style="font-size:9px;color:#fbbf24;font-weight:600;margin-top:4px">⏳ '+awaiting.map(p=>'#'+p.num).join(' ')+' in attesa</div>':'')
      +'<div style="margin-top:8px">';
    ps.forEach(p=>{
      const hlScheduleLabels={foto:'📷',video:'🎬',priority:'⭐'};
      const shlArr=Array.isArray(p.highlight)?p.highlight:(p.highlight?[p.highlight]:[]);
      const shlClass=shlArr.includes('foto')&&shlArr.includes('video')?'hl-both':shlArr.length===1?'hl-'+shlArr[0]:'';
      html+='<div class="card-inner'+(shlClass?' '+shlClass:'')+'"><div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">'
        +(shlArr.length?shlArr.map(h=>'<span class="hl-badge hl-'+h+'" style="padding:1px 5px;font-size:8px">'+hlScheduleLabels[h]+'</span>').join(''):'')
        +'<span class="inner-num">#'+p.num+'</span><span class="inner-name">'+p.name+'</span>'
        +(p.group?'<span class="inner-group">GRP '+p.group+'</span>':'')
        +'<span class="inner-team-big">'+p.team+'</span></div>'
        +'<div class="tasks">'+TASKS.map(t=>taskBtn(p.num,t,true)).join('')+'</div>'
        +(notes[p.num]?'<div style="margin-top:6px;font-size:11px;color:var(--text4);font-style:italic">📝 '+notes[p.num]+'</div>':'')+'</div>';
    });
    html+='</div></div>';
  });
  if(activeDay===currentDays[currentDays.length-1]&&currentFinals.length){
    html+='<div class="session-divider">FINALI</div>';
    const myCats=[...new Set(pilots.map(p=>p.cat))];
    currentFinals.filter(f=>myCats.includes(f.cat)).forEach(f=>{
      const allCat=pilots.filter(p=>p.cat===f.cat);
      const finalists=allCat.filter(p=>p.inFinal);
      const ps=finalists.length?finalists:allCat;
      html+='<div class="final-card"><div class="final-title">🏆 '+f.label+'</div>'
        +'<div class="final-row"><span>Partenza</span><span class="final-time">'+f.time+'</span></div>';
      ps.forEach(p=>{
        html+='<div class="card-inner" style="margin-top:8px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">'
          +'<span class="inner-num">#'+p.num+'</span><span class="inner-name">'+p.name+'</span>'
          +'<span class="inner-team-big">'+p.team+'</span></div>'
          +'<div class="tasks">'+TASKS.map(t=>taskBtn(p.num,t,true)).join('')+'</div></div>';
      });
      html+='</div>';
    });
  }
  el.innerHTML=html||'<div class="empty-state"><p>Nessun tuo pilota in questa giornata</p></div>';
  const fab=document.getElementById('fab-now');if(fab)fab.classList.add('visible');
  const fabTop=document.getElementById('fab-top');if(fabTop)fabTop.classList.add('visible');
  if(scheduleNeedsScroll){
    scheduleNeedsScroll=false;
    setTimeout(()=>{const nowEl=document.getElementById('slot-now');if(nowEl)nowEl.scrollIntoView({behavior:'smooth',block:'center'});},150);
  }
}

// Programma search
function filterProgramma(q){
  const resultsEl=document.getElementById('prog-search-results');
  const clearBtn=document.getElementById('prog-search-clear');
  const schedEl=document.getElementById('schedule-content');
  if(!q||!q.trim()){
    resultsEl.style.display='none';schedEl.style.display='';
    if(clearBtn)clearBtn.style.display='none';return;
  }
  if(clearBtn)clearBtn.style.display='block';
  schedEl.style.display='none';resultsEl.style.display='';
  const query=q.trim().toUpperCase();
  // Search in my pilots and entry list
  const matches=[];
  // My pilots first
  pilots.forEach(p=>{
    if(p.num.startsWith(query)||p.name.toUpperCase().includes(query)||p.team.toUpperCase().includes(query)){
      matches.push({num:p.num,name:p.name,team:p.team,cat:p.cat,isMine:true,eliminated:p.eliminated});
    }
  });
  // Entry list
  Object.entries(currentEntryList).forEach(([num,e])=>{
    if(matches.find(m=>m.num===num))return;
    const nameStr=((e.lastName||'')+' '+(e.firstName||'')).toUpperCase();
    const teamStr=(e.team||'').toUpperCase();
    if(num.startsWith(query)||nameStr.includes(query)||teamStr.includes(query)){
      matches.push({num,name:(e.lastName||'')+' '+(e.firstName||''),team:e.team||'',cat:e.cat||'',isMine:false});
    }
  });
  if(!matches.length){resultsEl.innerHTML='<div class="empty-state"><p>Nessun risultato</p></div>';return;}
  let html='<div style="font-size:10px;color:var(--text4);font-weight:700;margin-bottom:8px">'+matches.length+' RISULTATI</div>';
  matches.forEach(m=>{
    html+='<div class="search-result-item" style="'+(m.isMine?'border-color:#22c55e;background:rgba(34,197,94,.06)':'')+'" onclick="openPilotDetail(\''+m.num+'\')">'
      +'<span class="sr-num" style="'+(m.isMine?'color:#22c55e':'')+'">#'+m.num+'</span>'
      +'<div style="flex:1;min-width:0">'
      +'<div class="sr-name">'+m.name+(m.isMine?' <span style="font-size:10px;color:#22c55e;font-weight:800">★</span>':'')+(m.eliminated?' <span style="font-size:9px;color:#ef4444">ELIM</span>':'')+'</div>'
      +'<div style="font-size:13px;font-weight:800;color:var(--text2)">'+m.team+'</div></div>'
      +'<span class="sr-cat '+catClass(m.cat)+'" style="padding:2px 7px;border-radius:6px;font-size:10px;font-weight:800">'+m.cat+'</span></div>';
  });
  resultsEl.innerHTML=html;
}
