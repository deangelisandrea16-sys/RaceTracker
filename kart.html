<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Race Tracker - Debug</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Courier New',monospace;background:#09090b;color:#fff;padding:20px;}
.log{background:#111;border:1px solid #333;border-radius:8px;padding:12px;margin-bottom:8px;font-size:12px;}
.log.ok{border-color:#22c55e;color:#4ade80;}
.log.err{border-color:#ef4444;color:#f87171;}
.log.warn{border-color:#f59e0b;color:#fbbf24;}
.log.info{border-color:#60a5fa;color:#93c5fd;}
h1{font-size:18px;margin-bottom:16px;font-weight:900;}
#logs{max-height:70vh;overflow-y:auto;}
button{padding:10px 20px;background:#22c55e;color:#000;border:none;border-radius:8px;font-weight:900;font-family:inherit;cursor:pointer;margin-top:12px;font-size:14px;}
.data-preview{background:#0a0a0a;border:1px solid #333;border-radius:8px;padding:12px;margin-top:12px;font-size:11px;max-height:300px;overflow:auto;white-space:pre-wrap;word-break:break-all;}
</style>
</head>
<body>
<h1>🔧 RACE TRACKER — DEBUG FIREBASE</h1>
<div id="logs"></div>
<button onclick="runTest()">🔄 RIPROVA TEST</button>
<div class="data-preview" id="data-preview" style="display:none"></div>

<script type="module">
const logsEl = document.getElementById('logs');
function log(msg, type='info') {
  const d = document.createElement('div');
  d.className = 'log ' + type;
  d.textContent = new Date().toLocaleTimeString() + ' — ' + msg;
  logsEl.appendChild(d);
  logsEl.scrollTop = logsEl.scrollHeight;
  console.log('[' + type + ']', msg);
}

log('🚀 Inizio diagnostica...', 'info');

// Step 1: Test REST API (bypassa SDK)
log('Step 1: Test REST API diretta...', 'info');
try {
  const resp = await fetch('https://karting-tools-default-rtdb.firebaseio.com/tracker.json');
  if (resp.ok) {
    const data = await resp.json();
    const pilotCount = data && data.pilots ? Object.keys(data.pilots).length : 0;
    log('✅ REST API OK — ' + pilotCount + ' piloti trovati', 'ok');
    document.getElementById('data-preview').style.display = 'block';
    document.getElementById('data-preview').textContent = JSON.stringify(data, null, 2).substring(0, 2000) + '...';
  } else {
    log('❌ REST API errore HTTP: ' + resp.status + ' ' + resp.statusText, 'err');
  }
} catch(e) {
  log('❌ REST API FALLITA: ' + e.message, 'err');
  log('Questo indica un problema di rete/CORS, non di Firebase rules', 'warn');
}

// Step 2: Load Firebase SDK
log('Step 2: Caricamento Firebase SDK...', 'info');
let app, db, fbRef, fbOnValue;
try {
  const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
  log('✅ firebase-app.js caricato', 'ok');

  const dbModule = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");
  log('✅ firebase-database.js caricato', 'ok');

  fbRef = dbModule.ref;
  fbOnValue = dbModule.onValue;

  const firebaseConfig = {
    apiKey: "AIzaSyB2t6Rm0x-LIMD8iWF_cAUXzdsBUCz6Byg",
    authDomain: "karting-tools.firebaseapp.com",
    databaseURL: "https://karting-tools-default-rtdb.firebaseio.com",
    projectId: "karting-tools",
    storageBucket: "karting-tools.firebasestorage.app",
    messagingSenderId: "199360301984",
    appId: "1:199360301984:web:50252111fe9b47231232c5"
  };

  log('Step 3: Inizializzazione app Firebase...', 'info');
  app = initializeApp(firebaseConfig);
  log('✅ Firebase app inizializzata', 'ok');

  log('Step 4: Connessione al database...', 'info');
  db = dbModule.getDatabase(app);
  log('✅ Database reference ottenuta', 'ok');

  // Step 5: Test connessione info
  log('Step 5: Test connessione .info/connected...', 'info');
  fbOnValue(fbRef(db, '.info/connected'), (snap) => {
    if (snap.val() === true) {
      log('✅ WebSocket CONNESSO a Firebase!', 'ok');
    } else {
      log('⚠️ WebSocket NON connesso (ancora)', 'warn');
    }
  });

  // Step 6: Listener sui dati
  log('Step 6: Ascolto dati tracker/...', 'info');
  
  // Timeout per rilevare se il listener non riceve mai dati
  let received = false;
  const timeout = setTimeout(() => {
    if (!received) {
      log('❌ TIMEOUT: Nessun dato ricevuto dopo 10 secondi', 'err');
      log('Possibili cause:', 'warn');
      log('  1. Firebase Rules bloccano read per SDK (ma non per REST)', 'warn');
      log('  2. WebSocket bloccato da firewall/proxy', 'warn');
      log('  3. Il dominio GitHub Pages non è autorizzato', 'warn');
      log('  4. Errore nel path del database', 'warn');
      log('', 'info');
      log('SOLUZIONE: Prova ad aprire la Firebase Console → Realtime Database → Rules', 'warn');
      log('e verifica che le rules siano: {"rules":{".read":true,".write":true}}', 'warn');
    }
  }, 10000);

  fbOnValue(fbRef(db, 'tracker'), (snapshot) => {
    received = true;
    clearTimeout(timeout);
    const data = snapshot.val();
    if (data) {
      const pilotCount = data.pilots ? Object.keys(data.pilots).length : 0;
      log('✅✅✅ DATI RICEVUTI VIA SDK! — ' + pilotCount + ' piloti', 'ok');
      log('Firebase funziona perfettamente. Il problema è nel rendering del tracker.', 'ok');
    } else {
      log('⚠️ Snapshot ricevuto ma vuoto (null)', 'warn');
    }
  }, (err) => {
    received = true;
    clearTimeout(timeout);
    log('❌ ERRORE LISTENER: ' + err.message, 'err');
    log('Code: ' + err.code, 'err');
    if (err.code === 'PERMISSION_DENIED') {
      log('→ Le Firebase Rules bloccano la lettura via SDK!', 'err');
      log('→ Vai su Firebase Console → Realtime Database → Rules', 'warn');
      log('→ Imposta: {"rules":{".read":true,".write":true}}', 'warn');
    }
  });

} catch(e) {
  log('❌ ERRORE FATALE nel setup Firebase: ' + e.message, 'err');
  log('Stack: ' + e.stack, 'err');
}

// Step 7: Check browser environment
log('Step 7: Info browser...', 'info');
log('UserAgent: ' + navigator.userAgent.substring(0, 100), 'info');
log('URL: ' + location.href, 'info');
log('Protocol: ' + location.protocol, 'info');

window.runTest = () => { location.reload(); };
</script>

</body>
</html>
