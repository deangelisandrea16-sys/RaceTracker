<title>Race Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Courier New',monospace;background:#09090b;color:#fff;min-height:100vh;padding-bottom:80px;}
.header{border-bottom:1px solid #3f3f46;padding:14px 16px;position:sticky;top:0;background:#09090b;z-index:100;display:flex;align-items:center;justify-content:space-between;}
.header-sub{font-size:10px;color:#a1a1aa;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;font-weight:600;}
.header-title{font-size:22px;font-weight:900;letter-spacing:1px;}
.header-badge{font-size:10px;font-weight:700;color:#22c55e;letter-spacing:1px;padding:4px 8px;border:1px solid #22c55e;border-radius:6px;}
.tabs{display:flex;border-bottom:1px solid #3f3f46;position:sticky;top:61px;background:#09090b;z-index:99;}
.tab{flex:1;padding:12px 8px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:none;border:none;color:#a1a1aa;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;}
.tab.active{color:#fff;border-bottom-color:#fff;}
.content{padding:16px;}
.card{border:1px solid #3f3f46;border-radius:12px;padding:14px;background:#1c1c1f;margin-bottom:12px;}
.card-inner{border-radius:8px;padding:10px;background:#111113;margin-bottom:8px;}
.card-inner:last-child{margin-bottom:0;}
.pilot-num{font-size:20px;font-weight:900;}
.pilot-name{font-size:14px;font-weight:700;color:#f4f4f5;}
.pilot-team{font-size:15px;font-weight:800;color:#e4e4e7;margin-top:4px;}
.pilot-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.tasks{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;}
.task-btn{font-size:11px;font-weight:700;padding:5px 10px;border-radius:6px;border:1px solid #52525b;color:#a1a1aa;background:none;cursor:pointer;font-family:inherit;}
.task-btn.green{border-color:#16a34a;background:#052e16;color:#4ade80;}
.task-btn.orange{border-color:#d97706;background:#1c1003;color:#fbbf24;}
.task-btn.red{border-color:#dc2626;background:#1c0303;color:#f87171;}
.note-area{width:100%;background:#111113;border:1px solid #3f3f46;border-radius:8px;padding:9px 12px;font-size:12px;color:#f4f4f5;font-family:inherit;resize:none;outline:none;min-height:50px;}
.cat-kz2{color:#f87171;}.cat-ok{color:#60a5fa;}.cat-okj{color:#c084fc;}
.cat-gr3{color:#34d399;}.cat-u10{color:#22d3ee;}.cat-nj{color:#fbbf24;}
.day-tabs{display:flex;overflow-x:auto;border-bottom:1px solid #3f3f46;background:#09090b;scrollbar-width:none;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{padding:10px 14px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:none;border:none;color:#a1a1aa;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;font-family:inherit;}
.day-tab.active{color:#fff;border-bottom-color:#fff;background:#1c1c1f;}
.session-div{font-size:10px;font-weight:800;color:#a1a1aa;letter-spacing:3px;padding:10px 0 6px;border-top:1px solid #3f3f46;margin-top:4px;}
.session-div:first-child{border-top:none;margin-top:0;}
.slot-time{font-size:18px;font-weight:900;}
.slot-label{font-size:12px;font-weight:800;letter-spacing:1px;}
.slot-type{font-size:10px;font-weight:600;color:#a1a1aa;margin-left:auto;}
.slot-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.inner-num{font-size:18px;font-weight:900;}
.inner-name{font-size:13px;font-weight:700;color:#f4f4f5;}
.inner-team{font-size:11px;color:#a1a1aa;margin-left:auto;}
.empty{opacity:.4;}
.save-btn{width:100%;padding:13px;background:#22c55e;color:#000;border:none;border-radius:8px;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;margin-bottom:12px;letter-spacing:1px;}
.group-badge{font-size:11px;font-weight:900;padding:3px 10px;border-radius:4px;border:1.5px solid #52525b;color:#fff;}
.group-badge.set{border-color:#60a5fa;color:#60a5fa;}
.parity-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;border:1px solid #52525b;color:#e4e4e7;}
</style>
</head>

function cycleStatus(cur){const i=STATUS_CYCLE.indexOf(cur);return STATUS_CYCLE[(i+1)%STATUS_CYCLE.length];}

function toggleTask(num,task){
  if(!statuses[num]) statuses[num]={};
  statuses[num][task]=cycleStatus(statuses[num][task]||'none');
  renderPilots();
}

function saveNote(num){
  const el=document.getElementById('note-'+num);
  if(el) notes[num]=el.value;
}

function showTab(tab){
  activeTab=tab;

  document.getElementById('tab-programma').style.display=tab==='programma'?'':'none';
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['piloti','programma'][i]===tab));
  if(tab==='piloti') renderPilots();
  if(tab==='programma') renderSchedule();
}

function taskBtn(num,task){
  const s=statuses[num]?.[task]||'none';
  return `<button class="task-btn ${s==='none'?'':s}" onclick="toggleTask('${num}','${task}')" style="padding:4px 8px;font-size:10px">${task}</button>`;
}

function pilotsForSlot(slot){
return pilots.filter(p=>{
if(p.cat!==slot.cat) return false;
if(slot.type===‘all’) return true;
if(slot.type===‘parity’) return p.parity===slot.filter;
if(slot.type===‘serie’){if(!p.serie) return true;return p.serie===slot.filter;}
if(slot.type===‘group’){if(!p.group) return true;return slot.filter.includes(p.group.toUpperCase());}
if(slot.type===‘prefinal’){if(!p.prefinal) return true;return p.prefinal===slot.filter;}
return false;
});
}

function slotLabel(slot){
if(slot.type===‘parity’) return slot.filter;
if(slot.type===‘serie’) return ‘S’+slot.filter;
if(slot.type===‘group’) return ‘GRP’;
if(slot.type===‘prefinal’) return ’PREF ’+slot.filter;
return ‘’;
}

function renderSchedule(){
const dt=document.getElementById(‘day-tabs’);
dt.innerHTML=DAYS.map(d=>`<button class="day-tab ${d===activeDay?'active':''}" onclick="setDay('${d}')">${d}</button>`).join(’’);
const el=document.getElementById(‘sched-content’);
const slots=SCHEDULE[activeDay];
if(!slots){el.innerHTML=’<p style="padding:20px;color:#a1a1aa">Nessun programma</p>’;return;}
let html=’’;let lastSess=’’;
slots.forEach(slot=>{
const ps=pilotsForSlot(slot);
if(slot.session&&slot.session!==lastSess){html+=`<div class="session-div">${slot.session}</div>`;lastSess=slot.session;}
if(!ps.length){
html+=`<div class="card empty"><div class="slot-header"><span class="slot-time">${slot.time}</span><span class="slot-label ${catClass(slot.cat)}">${slot.label}</span><span class="slot-type">${slotLabel(slot)}</span></div><div style="font-size:11px;color:#a1a1aa;font-weight:700">— NESSUNO —</div></div>`;
return;
}
html+=`<div class="card"><div class="slot-header"><span class="slot-time">${slot.time}</span><span class="slot-label ${catClass(slot.cat)}">${slot.label}</span><span class="slot-type">${slotLabel(slot)}</span></div><div>`;
ps.forEach(p=>{
html+=`<div class="card-inner"> <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"> <span class="inner-num">#${p.num}</span> <span class="inner-name">${p.name}</span> <span class="inner-team">${p.team}</span> </div> <div class="tasks">${TASKS.map(t=>taskBtn(p.num,t)).join('')}</div> ${notes[p.num]?`<div style="margin-top:4px;font-size:11px;color:#a1a1aa">📝 ${notes[p.num]}</div>`:''} </div>`;
});
html+=`</div></div>`;
});
if(activeDay===‘DOMENICA’){
html+=`<div class="session-div">FINALI</div>`;
FINALS.forEach(f=>{
const ps=pilots.filter(p=>p.cat===f.cat);
if(!ps.length) return;
html+=`<div class="card" style="border-color:#fbbf24"> <div style="font-size:14px;font-weight:900;color:#fbbf24;margin-bottom:8px">🏆 ${f.label} — ${f.time}</div> ${ps.map(p=>`<div class="card-inner"><div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span class="inner-num">#${p.num}</span><span class="inner-name">${p.name}</span></div><div class="tasks">${TASKS.map(t=>taskBtn(p.num,t)).join(’’)}</div></div>`).join('')} </div>`;
});
}
el.innerHTML=html||’<p style="padding:20px;color:#a1a1aa">Nessun pilota oggi</p>’;
}

function setDay(d){activeDay=d;renderSchedule();}

function exportData(){
const data={pilots,statuses,notes,exportedAt:new Date().toISOString()};
const blob=new Blob([JSON.stringify(data,null,2)],{type:‘application/json’});
const url=URL.createObjectURL(blob);
const a=document.createElement(‘a’);a.href=url;a.download=‘race-tracker-backup.json’;a.click();
URL.revokeObjectURL(url);
}
