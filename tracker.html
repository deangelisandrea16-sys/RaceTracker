<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Race Tracker">
<title>Race Tracker</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

  :root {
    --bg:#09090b; --bg2:#1c1c1f; --bg3:#111113;
    --border:#3f3f46; --border2:#52525b;
    --text:#ffffff; --text2:#f4f4f5; --text3:#e4e4e7; --text4:#a1a1aa;
    --task-border:#52525b; --task-color:#a1a1aa;
    --modal-bg:#1c1c1f; --input-bg:#09090b;
    --btn-bg:#2a2a2e; --btn-color:#f4f4f5;
    --empty:#71717a; --empty2:#3f3f46;
  }
  body.light {
    --bg:#f4f4f5; --bg2:#ffffff; --bg3:#f1f1f3;
    --border:#d4d4d8; --border2:#a1a1aa;
    --text:#09090b; --text2:#18181b; --text3:#3f3f46; --text4:#71717a;
    --task-border:#a1a1aa; --task-color:#71717a;
    --modal-bg:#ffffff; --input-bg:#f4f4f5;
    --btn-bg:#e4e4e7; --btn-color:#18181b;
    --empty:#a1a1aa; --empty2:#d4d4d8;
  }

  body { font-family:'Courier New',monospace; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:80px; transition:background .2s,color .2s; }

  .header { border-bottom:1px solid var(--border); padding:14px 16px; position:sticky; top:0; background:var(--bg); z-index:100; display:flex; align-items:center; justify-content:space-between; }
  .header-dot { width:8px; height:8px; border-radius:50%; background:#ef4444; display:inline-block; margin-right:8px; animation:pulse 2s infinite; }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .header-sub { font-size:10px; color:var(--text4); letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; font-weight:600; }
  .header-title { font-size:22px; font-weight:900; color:var(--text); letter-spacing:1px; }
  .header-right { display:flex; gap:8px; align-items:center; }
  .theme-btn { background:none; border:1px solid var(--border2); border-radius:8px; padding:6px 10px; font-size:16px; cursor:pointer; }

  .tabs { display:flex; border-bottom:1px solid var(--border); position:sticky; top:61px; background:var(--bg); z-index:99; }
  .tab { flex:1; padding:12px 8px; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; background:none; border:none; color:var(--text4); cursor:pointer; border-bottom:2px solid transparent; font-family:inherit; }
  .tab.active { color:var(--text); border-bottom-color:var(--text); }

  .subtabs { display:flex; border-bottom:1px solid var(--border); background:var(--bg); }
  .subtab { padding:10px 16px; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; background:none; border:none; color:var(--text4); cursor:pointer; border-bottom:2px solid transparent; font-family:inherit; }
  .subtab.active { color:var(--text); border-bottom-color:var(--text); }

  .content { padding:16px; }
  .hint { font-size:11px; color:var(--text4); margin-bottom:12px; font-weight:500; }

  .card { border:1px solid var(--border); border-radius:12px; padding:14px; background:var(--bg2); margin-bottom:12px; }
  .card-inner { border-radius:8px; padding:10px; background:var(--bg3); margin-bottom:8px; }
  .card-inner:last-child { margin-bottom:0; }

  .pilot-cat { font-size:11px; font-weight:800; letter-spacing:3px; }
  .pilot-num { font-size:20px; font-weight:900; color:var(--text); }
  .pilot-name { font-size:14px; font-weight:700; color:var(--text2); }
  .pilot-team { font-size:12px; font-weight:500; color:var(--text4); margin-top:2px; }
  .pilot-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
  .parity-badge { font-size:10px; font-weight:700; padding:3px 8px; border-radius:4px; border:1px solid var(--border2); color:var(--text3); }
  .pilot-edit-btn { font-size:11px; font-weight:600; color:var(--text3); background:none; border:1px solid var(--border); border-radius:5px; padding:4px 10px; cursor:pointer; font-family:inherit; }

  .tasks { display:flex; flex-wrap:wrap; gap:7px; }
  .task-btn { font-size:11px; font-weight:700; padding:5px 10px; border-radius:6px; border:1px solid var(--task-border); color:var(--task-color); background:none; cursor:pointer; font-family:inherit; transition:all .15s; letter-spacing:.5px; }
  .task-btn.green { border-color:#16a34a; background:#052e16; color:#4ade80; }
  .task-btn.orange { border-color:#d97706; background:#1c1003; color:#fbbf24; }
  .task-btn.red { border-color:#dc2626; background:#1c0303; color:#f87171; }
  body.light .task-btn.green { background:#dcfce7; color:#15803d; border-color:#16a34a; }
  body.light .task-btn.orange { background:#fef3c7; color:#b45309; border-color:#d97706; }
  body.light .task-btn.red { background:#fee2e2; color:#b91c1c; border-color:#dc2626; }

  /* NOTE */
  .note-wrap { margin-top:10px; }
  .note-label { font-size:10px; font-weight:800; color:var(--text4); letter-spacing:2px; text-transform:uppercase; margin-bottom:5px; display:block; }
  .note-area { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:9px 12px; font-size:12px; font-weight:500; color:var(--text2); font-family:inherit; resize:none; outline:none; min-height:56px; }
  .note-area::placeholder { color:var(--text4); }

  /* EXPORT/IMPORT */
  .io-row { display:flex; gap:8px; margin-bottom:14px; }
  .io-btn { flex:1; padding:11px 8px; background:var(--bg2); border:1px solid var(--border2); border-radius:8px; font-size:11px; font-weight:700; color:var(--btn-color); cursor:pointer; font-family:inherit; text-align:center; letter-spacing:.5px; }
  .io-btn.export { border-color:#34d399; color:#34d399; }
  .io-btn.import { border-color:#60a5fa; color:#60a5fa; }
  body.light .io-btn.export { border-color:#059669; color:#059669; }
  body.light .io-btn.import { border-color:#2563eb; color:#2563eb; }

  .slot-time { font-size:18px; font-weight:900; color:var(--text); }
  .slot-cat { font-size:12px; font-weight:800; letter-spacing:1px; }
  .slot-parity { font-size:11px; font-weight:600; color:var(--text4); margin-left:auto; }
  .slot-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .inner-num { font-size:12px; font-weight:800; color:var(--text3); }
  .inner-name { font-size:13px; font-weight:700; color:var(--text2); }
  .inner-team { font-size:11px; font-weight:500; color:var(--text4); margin-left:auto; }

  .day-tabs { display:flex; overflow-x:auto; border-bottom:1px solid var(--border); background:var(--bg); scrollbar-width:none; }
  .day-tabs::-webkit-scrollbar { display:none; }
  .day-tab { padding:10px 14px; font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; background:none; border:none; color:var(--text4); cursor:pointer; white-space:nowrap; border-bottom:2px solid transparent; font-family:inherit; }
  .day-tab.active { color:var(--text); border-bottom-color:var(--text); background:var(--bg2); }

  .section-editor { border-bottom:1px solid var(--border); padding:16px; background:var(--bg); }
  .section-label { font-size:11px; font-weight:700; color:var(--text4); letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; }
  .sections-list { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
  .section-tag { display:flex; align-items:center; gap:6px; background:var(--bg2); border:1px solid var(--border2); border-radius:6px; padding:6px 10px; }
  .section-tag span { font-size:12px; font-weight:700; color:var(--text2); cursor:pointer; }
  .section-remove { font-size:12px; color:var(--text4); cursor:pointer; background:none; border:none; padding:0; font-weight:700; }
  .add-row { display:flex; gap:8px; }
  .add-input { flex:1; background:var(--bg2); border:1px solid var(--border2); border-radius:6px; padding:9px 12px; font-size:13px; font-weight:600; color:var(--text); outline:none; font-family:inherit; }
  .add-btn { padding:9px 14px; background:var(--btn-bg); border:1px solid var(--border2); border-radius:6px; font-size:12px; font-weight:700; color:var(--btn-color); cursor:pointer; font-family:inherit; }

  .coverage-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .coverage-title { font-size:14px; font-weight:800; color:var(--text); }
  .coverage-stats { display:flex; gap:10px; font-size:12px; font-weight:700; }
  .stat-green { color:#4ade80; } body.light .stat-green { color:#15803d; }
  .stat-orange { color:#fbbf24; } body.light .stat-orange { color:#b45309; }
  .stat-none { color:var(--text4); }
  .coverage-row { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
  .cov-num { font-size:12px; font-weight:800; color:var(--text3); }
  .cov-name { font-size:12px; font-weight:700; color:var(--text2); }
  .dot-btn { width:13px; height:13px; border-radius:50%; border:1.5px solid var(--border2); background:transparent; cursor:pointer; flex-shrink:0; }
  .dot-btn.green { background:#22c55e; border-color:#22c55e; }
  .dot-btn.orange { background:#f59e0b; border-color:#f59e0b; }
  .dot-btn.red { background:#ef4444; border-color:#ef4444; }

  .empty-state { text-align:center; padding:60px 20px; }
  .empty-state p { color:var(--empty); font-size:14px; font-weight:600; }
  .empty-state small { color:var(--empty2); font-size:12px; margin-top:6px; display:block; }
  .mgmt-btn { padding:12px 16px; background:var(--bg2); border:1px solid var(--border2); border-radius:8px; font-size:12px; font-weight:700; color:var(--btn-color); cursor:pointer; font-family:inherit; margin-bottom:12px; display:block; width:100%; text-align:center; letter-spacing:1px; }
  .no-pilots { font-size:12px; font-weight:500; color:var(--text4); font-style:italic; padding:8px 0; }

  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:200; display:flex; align-items:flex-end; }
  .modal { background:var(--modal-bg); border-radius:16px 16px 0 0; width:100%; padding:20px; max-height:90vh; overflow-y:auto; border-top:1px solid var(--border); }
  .modal-title { font-size:16px; font-weight:900; margin-bottom:16px; color:var(--text); }
  .modal-close { float:right; background:none; border:none; color:var(--text4); font-size:20px; cursor:pointer; }
  .form-group { margin-bottom:14px; }
  .form-label { font-size:10px; font-weight:800; color:var(--text4); letter-spacing:2px; text-transform:uppercase; margin-bottom:5px; display:block; }
  .form-input { width:100%; background:var(--input-bg); border:1px solid var(--border2); border-radius:8px; padding:11px 12px; font-size:14px; font-weight:600; color:var(--text); outline:none; font-family:inherit; }
  .form-select { width:100%; background:var(--input-bg); border:1px solid var(--border2); border-radius:8px; padding:11px 12px; font-size:14px; font-weight:600; color:var(--text); outline:none; font-family:inherit; }
  .form-textarea { width:100%; background:var(--input-bg); border:1px solid var(--border2); border-radius:8px; padding:11px 12px; font-size:13px; font-weight:500; color:var(--text); outline:none; font-family:inherit; resize:none; min-height:80px; }
  .form-submit { width:100%; padding:13px; background:var(--text); color:var(--bg); border:none; border-radius:8px; font-size:14px; font-weight:900; cursor:pointer; font-family:inherit; margin-top:8px; letter-spacing:1px; }
  .form-delete { width:100%; padding:13px; background:none; color:#ef4444; border:1.5px solid #ef4444; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; margin-top:8px; }

  .cat-kz2{color:#f87171;} body.light .cat-kz2{color:#dc2626;}
  .cat-ok{color:#60a5fa;} body.light .cat-ok{color:#2563eb;}
  .cat-okj{color:#c084fc;} body.light .cat-okj{color:#7c3aed;}
  .cat-gr3{color:#34d399;} body.light .cat-gr3{color:#059669;}
  .cat-u10{color:#22d3ee;} body.light .cat-u10{color:#0891b2;}
  .cat-nj{color:#fbbf24;} body.light .cat-nj{color:#d97706;}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-sub"><span class="header-dot"></span>WSK Super Master 2026 · Franciacorta</div>
    <div class="header-title">RACE TRACKER</div>
  </div>
  <div class="header-right">
    <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">☀️</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('piloti')">PILOTI</button>
  <button class="tab" onclick="showTab('programma')">PROGRAMMA</button>
  <button class="tab" onclick="showTab('pista')">PISTA</button>
</div>

<div id="tab-piloti" class="tab-content">
  <div class="content">
    <div class="io-row">
      <button class="io-btn export" onclick="exportData()">⬇ ESPORTA</button>
      <button class="io-btn import" onclick="document.getElementById('import-input').click()">⬆ IMPORTA</button>
      <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)">
    </div>
    <button class="mgmt-btn" onclick="openAddPilot()">+ AGGIUNGI PILOTA</button>
    <p class="hint">Tocca un task per cambiare stato · "modifica" per editare</p>
    <div id="pilots-list"></div>
  </div>
</div>

<div id="tab-programma" class="tab-content" style="display:none">
  <div class="day-tabs" id="day-tabs"></div>
  <div class="content" id="schedule-content"></div>
</div>

<div id="tab-pista" class="tab-content" style="display:none">
  <div class="section-editor">
    <div class="section-label">⚙ Sezioni del circuito</div>
    <div class="sections-list" id="sections-list"></div>
    <div class="add-row">
      <input class="add-input" id="new-section-input" placeholder="Aggiungi sezione..." onkeydown="if(event.key==='Enter')addSection()">
      <button class="add-btn" onclick="addSection()">+ AGGIUNGI</button>
    </div>
    <p class="hint" style="margin-top:8px">Doppio tocco per modificare · ✕ per eliminare</p>
  </div>
  <div class="subtabs">
    <button class="subtab active" onclick="showPistaView('pilota')">PILOTA</button>
    <button class="subtab" onclick="showPistaView('sessione')">SESSIONE</button>
  </div>
  <div class="content" id="pista-content"></div>
</div>

<div class="modal-overlay" id="modal" style="display:none" onclick="closeModalOutside(event)">
  <div class="modal" id="modal-inner"></div>
</div>

<script>
const DEFAULT_PILOTS = [
  {num:"114",name:"SIACHKO YAUHEN",team:"AKM",cat:"KZ2",parity:"EVEN"},
  {num:"229",name:"GALAN OSKAR",team:"FUSION MOTORSPORT",cat:"OK",parity:"ODD"},
  {num:"268",name:"VISUET CRUZ",team:"MO ACADEMY GAMOTO",cat:"OK",parity:"EVEN"},
  {num:"342",name:"GIRADELLO GIOELE",team:"PAROLIN MOTORSPORT",cat:"OKJ",parity:"EVEN"},
  {num:"538",name:"BUFFO ANDREA",team:"BABYRACE",cat:"MINI GR3",parity:"EVEN"},
  {num:"621",name:"LEPP SIIM",team:"AIX RACING",cat:"MINI GR3",parity:"ODD"},
  {num:"647",name:"YOON ISAAC",team:"BABYRACE",cat:"MINI GR3",parity:"ODD"},
  {num:"648",name:"YOON DANIEL",team:"BABYRACE",cat:"MINI U10",parity:"EVEN"},
  {num:"650",name:"PREVILLE CHARLIE",team:"BABYRACE",cat:"MINI U10",parity:"EVEN"},
  {num:"716",name:"KRISTIANSEN PATRIK",team:"MP GAMOTO",cat:"OK-NJ",parity:"EVEN"},
  {num:"729",name:"SIACHKO ARSENYI",team:"AKM",cat:"OK-NJ",parity:"ODD"},
  {num:"730",name:"WOJCIK DOMINIK",team:"TEAM DRIVER",cat:"OK-NJ",parity:"EVEN"},
  {num:"740",name:"BRAGEOT MATTIS",team:"AKM",cat:"OK-NJ",parity:"EVEN"},
  {num:"788",name:"MORENO IKER",team:"DR SRL",cat:"OK-NJ",parity:"EVEN"},
];

const TASKS=["PADDOK","PREGRIGLIA","BILANCIA","PISTA","REPORTAGE"];
const DAYS=["MERCOLEDÌ","GIOVEDÌ","VENERDÌ","SABATO","DOMENICA"];
const STATUS_CYCLE=["none","green","orange","red"];

const SCHEDULE=[
  {time:"8.00",cat:"KZ2",parity:"ODD"},{time:"8.13",cat:"KZ2",parity:"EVEN"},
  {time:"8.26",cat:"OK",parity:"ODD"},{time:"8.39",cat:"OK",parity:"EVEN"},
  {time:"8.52",cat:"OKJ",parity:"ODD"},{time:"9.05",cat:"OKJ",parity:"EVEN"},
  {time:"9.18",cat:"MINI U10",parity:"ALL"},
  {time:"9.31",cat:"MINI GR3",parity:"ODD"},{time:"9.44",cat:"MINI GR3",parity:"EVEN"},
  {time:"9.57",cat:"OK-NJ",parity:"ODD"},{time:"10.10",cat:"OK-NJ",parity:"EVEN"},
  {time:"10.23",cat:"KZ2",parity:"ODD"},{time:"10.36",cat:"KZ2",parity:"EVEN"},
  {time:"10.49",cat:"OK",parity:"ODD"},{time:"11.02",cat:"OK",parity:"EVEN"},
  {time:"11.15",cat:"OKJ",parity:"ODD"},{time:"11.28",cat:"OKJ",parity:"EVEN"},
  {time:"11.41",cat:"MINI U10",parity:"ALL"},
  {time:"11.54",cat:"MINI GR3",parity:"ODD"},{time:"12.07",cat:"MINI GR3",parity:"EVEN"},
  {time:"12.20",cat:"OK-NJ",parity:"ODD"},{time:"12.33",cat:"OK-NJ",parity:"EVEN"},
  {time:"13.25",cat:"KZ2",parity:"ODD"},{time:"13.38",cat:"KZ2",parity:"EVEN"},
  {time:"13.51",cat:"OK",parity:"ODD"},{time:"14.04",cat:"OK",parity:"EVEN"},
  {time:"14.17",cat:"OKJ",parity:"ODD"},{time:"14.30",cat:"OKJ",parity:"EVEN"},
  {time:"14.43",cat:"MINI U10",parity:"ALL"},
  {time:"14.56",cat:"MINI GR3",parity:"ODD"},{time:"15.09",cat:"MINI GR3",parity:"EVEN"},
  {time:"15.22",cat:"OK-NJ",parity:"ODD"},{time:"15.35",cat:"OK-NJ",parity:"EVEN"},
  {time:"15.48",cat:"KZ2",parity:"ODD"},{time:"16.01",cat:"KZ2",parity:"EVEN"},
  {time:"16.14",cat:"OK",parity:"ODD"},{time:"16.27",cat:"OK",parity:"EVEN"},
  {time:"16.40",cat:"OKJ",parity:"ODD"},{time:"16.53",cat:"OKJ",parity:"EVEN"},
  {time:"17.10",cat:"MINI U10",parity:"ALL"},
  {time:"17.23",cat:"MINI GR3",parity:"ODD"},{time:"17.36",cat:"MINI GR3",parity:"EVEN"},
  {time:"17.49",cat:"OK-NJ",parity:"ODD"},{time:"18.02",cat:"OK-NJ",parity:"EVEN"},
];

function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

let pilots=load('rt_pilots',DEFAULT_PILOTS);
let statuses=load('rt_statuses',{});
let notes=load('rt_notes',{});
let trackSections=load('rt_sections',["PARTENZA","CURVA 1","RETTILINEO 1","CURVA 2","ESSE","RETTILINEO 2","ARRIVO"]);
let trackStatus=load('rt_track',{});
let activeDay=load('rt_day','MERCOLEDÌ');
let pistaView=load('rt_pistaview','pilota');
let isDark=load('rt_theme',true);

pilots.forEach(p=>{
  if(!statuses[p.num]) statuses[p.num]={};
  TASKS.forEach(t=>{if(!statuses[p.num][t]) statuses[p.num][t]='none';});
  if(!trackStatus[p.num]) trackStatus[p.num]={};
  if(!notes[p.num]) notes[p.num]='';
});

// ── THEME ──
function applyTheme(){ document.body.classList.toggle('light',!isDark); document.getElementById('theme-btn').textContent=isDark?'☀️':'🌙'; }
function toggleTheme(){ isDark=!isDark; save('rt_theme',isDark); applyTheme(); }
applyTheme();

// ── HELPERS ──
function cycleStatus(cur){const i=STATUS_CYCLE.indexOf(cur);return STATUS_CYCLE[(i+1)%STATUS_CYCLE.length];}
function catClass(cat){
  if(cat==='KZ2') return 'cat-kz2'; if(cat==='OK') return 'cat-ok';
  if(cat==='OKJ') return 'cat-okj'; if(cat==='MINI GR3') return 'cat-gr3';
  if(cat==='MINI U10') return 'cat-u10'; if(cat==='OK-NJ') return 'cat-nj';
  return '';
}
function pilotsForSlot(slot){return pilots.filter(p=>{if(p.cat!==slot.cat) return false;if(slot.parity==='ALL') return true;return p.parity===slot.parity;});}

// ── TOGGLE ──
function toggleTask(num,task){
  if(!statuses[num]) statuses[num]={};
  statuses[num][task]=cycleStatus(statuses[num][task]||'none');
  save('rt_statuses',statuses); renderAll();
}
function toggleTrack(num,section){
  if(!trackStatus[num]) trackStatus[num]={};
  trackStatus[num][section]=cycleStatus(trackStatus[num][section]||'none');
  save('rt_track',trackStatus); renderPista();
}
function saveNote(num){
  const el=document.getElementById('note-'+num);
  if(el){ notes[num]=el.value; save('rt_notes',notes); }
}

// ── EXPORT / IMPORT ──
function exportData(){
  const data={pilots,statuses,notes,trackSections,trackStatus,exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='race-tracker-backup.json'; a.click();
  URL.revokeObjectURL(url);
}
function importData(event){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.pilots) { pilots=data.pilots; save('rt_pilots',pilots); }
      if(data.statuses) { statuses=data.statuses; save('rt_statuses',statuses); }
      if(data.notes) { notes=data.notes; save('rt_notes',notes); }
      if(data.trackSections) { trackSections=data.trackSections; save('rt_sections',trackSections); }
      if(data.trackStatus) { trackStatus=data.trackStatus; save('rt_track',trackStatus); }
      alert('✅ Dati importati con successo!');
      renderAll();
    }catch(err){ alert('❌ File non valido'); }
  };
  reader.readAsText(file);
  event.target.value='';
}

// ── TASK BUTTON ──
function taskBtn(num,task,small){
  const s=(statuses[num]&&statuses[num][task])||'none';
  const sz=small?'style="font-size:10px;padding:4px 8px"':'';
  return `<button class="task-btn ${s==='none'?'':s}" ${sz} onclick="toggleTask('${num}','${task}')">${task}</button>`;
}

// ── TABS ──
let activeTab='piloti';
function showTab(tab){
  activeTab=tab;
  document.querySelectorAll('.tab-content').forEach(el=>el.style.display='none');
  document.getElementById('tab-'+tab).style.display='block';
  document.querySelectorAll('.tab').forEach((el,i)=>{el.classList.toggle('active',['piloti','programma','pista'][i]===tab);});
  if(tab==='piloti') renderPilots();
  if(tab==='programma') renderSchedule();
  if(tab==='pista') renderPista();
}

// ── RENDER PILOTS ──
function renderPilots(){
  const el=document.getElementById('pilots-list');
  if(!pilots.length){el.innerHTML='<p class="no-pilots">Nessun pilota. Aggiungine uno!</p>';return;}
  el.innerHTML=pilots.map(p=>`
    <div class="card">
      <div class="pilot-header">
        <div>
          <div class="pilot-cat ${catClass(p.cat)}">${p.cat}</div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:3px">
            <span class="pilot-num">#${p.num}</span>
            <span class="pilot-name">${p.name}</span>
          </div>
          <div class="pilot-team">${p.team}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:7px">
          <span class="parity-badge">${p.parity}</span>
          <button class="pilot-edit-btn" onclick="openEditPilot('${p.num}')">✎ modifica</button>
        </div>
      </div>
      <div class="tasks">${TASKS.map(t=>taskBtn(p.num,t,false)).join('')}</div>
      <div class="note-wrap">
        <span class="note-label">Note</span>
        <textarea class="note-area" id="note-${p.num}" placeholder="Aggiungi una nota..." onblur="saveNote('${p.num}')" onchange="saveNote('${p.num}')">${notes[p.num]||''}</textarea>
      </div>
    </div>
  `).join('');
}

// ── RENDER SCHEDULE ──
function renderSchedule(){
  const dt=document.getElementById('day-tabs');
  dt.innerHTML=DAYS.map(d=>`<button class="day-tab ${d===activeDay?'active':''}" onclick="setDay('${d}')">${d}</button>`).join('');
  const el=document.getElementById('schedule-content');
  const hasSched=activeDay==='MERCOLEDÌ'||activeDay==='GIOVEDÌ';
  if(!hasSched){el.innerHTML='<div class="empty-state"><p>Programma non ancora disponibile</p><small>In attesa dei PDF ufficiali WSK</small></div>';return;}
  let html='';
  SCHEDULE.forEach(slot=>{
    const ps=pilotsForSlot(slot);
    if(!ps.length) return;
    html+=`<div class="card">
      <div class="slot-header">
        <span class="slot-time">${slot.time}</span>
        <span class="slot-cat ${catClass(slot.cat)}">${slot.cat}</span>
        <span class="slot-parity">${slot.parity}</span>
      </div>
      ${ps.map(p=>`
        <div class="card-inner">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <span class="inner-num">#${p.num}</span>
            <span class="inner-name">${p.name}</span>
            <span class="inner-team">${p.team}</span>
          </div>
          <div class="tasks">${TASKS.map(t=>taskBtn(p.num,t,true)).join('')}</div>
          ${notes[p.num]?`<div style="margin-top:8px;font-size:11px;color:var(--text4);font-style:italic">📝 ${notes[p.num]}</div>`:''}
        </div>
      `).join('')}
    </div>`;
  });
  el.innerHTML=html||'<p class="hint">Nessun tuo pilota in questo turno</p>';
}

function setDay(d){activeDay=d;save('rt_day',d);renderSchedule();}

// ── RENDER PISTA ──
function renderPista(){
  const sl=document.getElementById('sections-list');
  sl.innerHTML=trackSections.map(s=>`
    <div class="section-tag">
      <span ondblclick="editSectionInline(this,'${s}')">${s}</span>
      <button class="section-remove" onclick="removeSection('${s}')">✕</button>
    </div>
  `).join('');
  document.querySelectorAll('.subtab').forEach((el,i)=>{el.classList.toggle('active',['pilota','sessione'][i]===pistaView);});
  const el=document.getElementById('pista-content');
  if(pistaView==='pilota'){
    if(!pilots.length){el.innerHTML='<p class="hint">Nessun pilota</p>';return;}
    el.innerHTML=pilots.map(p=>`
      <div class="card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
          <span class="pilot-cat ${catClass(p.cat)}">${p.cat}</span>
          <span class="pilot-num">#${p.num}</span>
          <span class="pilot-name">${p.name}</span>
        </div>
        ${trackSections.length===0?'<p class="no-pilots">Nessuna sezione definita</p>':
          `<div class="tasks">${trackSections.map(s=>{
            const st=(trackStatus[p.num]&&trackStatus[p.num][s])||'none';
            return `<button class="task-btn ${st==='none'?'':st}" onclick="toggleTrack('${p.num}','${s}')">${s}</button>`;
          }).join('')}</div>`}
      </div>
    `).join('');
  } else {
    if(!trackSections.length){el.innerHTML='<p class="hint">Nessuna sezione definita</p>';return;}
    el.innerHTML=trackSections.map(s=>{
      const covered=pilots.filter(p=>(trackStatus[p.num]&&trackStatus[p.num][s])==='green').length;
      const partial=pilots.filter(p=>(trackStatus[p.num]&&trackStatus[p.num][s])==='orange').length;
      const missing=pilots.length-covered-partial;
      return `<div class="card">
        <div class="coverage-header">
          <span class="coverage-title">${s}</span>
          <div class="coverage-stats">
            <span class="stat-green">${covered} ✓</span>
            ${partial>0?`<span class="stat-orange">${partial} ~</span>`:''}
            <span class="stat-none">${missing} —</span>
          </div>
        </div>
        ${pilots.map(p=>{
          const st=(trackStatus[p.num]&&trackStatus[p.num][s])||'none';
          return `<div class="coverage-row">
            <button class="dot-btn ${st==='none'?'':st}" onclick="toggleTrack('${p.num}','${s}')"></button>
            <span class="cov-num">#${p.num}</span>
            <span class="cov-name">${p.name}</span>
            <span class="pilot-cat ${catClass(p.cat)}" style="margin-left:auto;font-size:11px">${p.cat}</span>
          </div>`;
        }).join('')}
      </div>`;
    }).join('');
  }
}

function showPistaView(v){pistaView=v;save('rt_pistaview',v);renderPista();}

function addSection(){
  const inp=document.getElementById('new-section-input');
  const val=inp.value.trim().toUpperCase();
  if(val&&!trackSections.includes(val)){trackSections.push(val);save('rt_sections',trackSections);inp.value='';renderPista();}
}
function removeSection(s){trackSections=trackSections.filter(x=>x!==s);save('rt_sections',trackSections);renderPista();}
function editSectionInline(el,oldVal){
  const inp=document.createElement('input');
  inp.style.cssText='background:none;border:none;outline:none;font-size:12px;font-weight:700;width:80px;font-family:inherit;color:inherit';
  inp.value=oldVal; el.parentNode.replaceChild(inp,el); inp.focus(); inp.select();
  function finish(){
    const nv=inp.value.trim().toUpperCase();
    if(nv&&nv!==oldVal&&!trackSections.includes(nv)){
      trackSections=trackSections.map(x=>x===oldVal?nv:x);
      pilots.forEach(p=>{if(trackStatus[p.num]&&trackStatus[p.num][oldVal]!==undefined){trackStatus[p.num][nv]=trackStatus[p.num][oldVal];delete trackStatus[p.num][oldVal];}});
      save('rt_sections',trackSections);save('rt_track',trackStatus);
    } renderPista();
  }
  inp.onblur=finish; inp.onkeydown=e=>{if(e.key==='Enter') inp.blur();if(e.key==='Escape') renderPista();};
}

// ── MODAL ──
function openModal(html){document.getElementById('modal-inner').innerHTML=html;document.getElementById('modal').style.display='flex';}
function closeModal(){document.getElementById('modal').style.display='none';}
function closeModalOutside(e){if(e.target===document.getElementById('modal')) closeModal();}

function openAddPilot(){
  openModal(`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">Aggiungi Pilota</div>
    <div class="form-group"><label class="form-label">Numero</label><input class="form-input" id="f-num" placeholder="es. 123" type="number"></div>
    <div class="form-group"><label class="form-label">Nome Cognome</label><input class="form-input" id="f-name" placeholder="es. ROSSI MARIO"></div>
    <div class="form-group"><label class="form-label">Scuderia</label><input class="form-input" id="f-team" placeholder="es. TEAM NAME"></div>
    <div class="form-group"><label class="form-label">Categoria</label>
      <select class="form-select" id="f-cat"><option>KZ2</option><option>OK</option><option>OKJ</option><option>MINI GR3</option><option>MINI U10</option><option>OK-NJ</option></select></div>
    <div class="form-group"><label class="form-label">Parità (numero kart)</label>
      <select class="form-select" id="f-parity"><option value="ODD">ODD (dispari)</option><option value="EVEN">EVEN (pari)</option></select></div>
    <div class="form-group"><label class="form-label">Note</label>
      <textarea class="form-textarea" id="f-note" placeholder="Note opzionali..."></textarea></div>
    <button class="form-submit" onclick="savePilot()">AGGIUNGI</button>
  `);
}

function savePilot(){
  const num=document.getElementById('f-num').value.trim();
  const name=document.getElementById('f-name').value.trim().toUpperCase();
  const team=document.getElementById('f-team').value.trim().toUpperCase();
  const cat=document.getElementById('f-cat').value;
  const parity=document.getElementById('f-parity').value;
  const note=document.getElementById('f-note').value.trim();
  if(!num||!name||!team){alert('Compila tutti i campi');return;}
  if(pilots.find(p=>p.num===num)){alert('Numero già presente');return;}
  pilots.push({num,name,team,cat,parity});
  statuses[num]={};TASKS.forEach(t=>statuses[num][t]='none');
  trackStatus[num]={};notes[num]=note;
  save('rt_pilots',pilots);save('rt_statuses',statuses);save('rt_track',trackStatus);save('rt_notes',notes);
  closeModal();renderAll();
}

function openEditPilot(num){
  const p=pilots.find(x=>x.num===num);if(!p) return;
  openModal(`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">Modifica #${p.num}</div>
    <div class="form-group"><label class="form-label">Nome Cognome</label><input class="form-input" id="ef-name" value="${p.name}"></div>
    <div class="form-group"><label class="form-label">Scuderia</label><input class="form-input" id="ef-team" value="${p.team}"></div>
    <div class="form-group"><label class="form-label">Categoria</label>
      <select class="form-select" id="ef-cat">${['KZ2','OK','OKJ','MINI GR3','MINI U10','OK-NJ'].map(c=>`<option ${c===p.cat?'selected':''}>${c}</option>`).join('')}</select></div>
    <div class="form-group"><label class="form-label">Parità</label>
      <select class="form-select" id="ef-parity"><option value="ODD" ${p.parity==='ODD'?'selected':''}>ODD (dispari)</option><option value="EVEN" ${p.parity==='EVEN'?'selected':''}>EVEN (pari)</option></select></div>
    <button class="form-submit" onclick="updatePilot('${num}')">SALVA MODIFICHE</button>
    <button class="form-delete" onclick="deletePilot('${num}')">Elimina pilota</button>
  `);
}

function updatePilot(num){
  const p=pilots.find(x=>x.num===num);if(!p) return;
  p.name=document.getElementById('ef-name').value.trim().toUpperCase();
  p.team=document.getElementById('ef-team').value.trim().toUpperCase();
  p.cat=document.getElementById('ef-cat').value;
  p.parity=document.getElementById('ef-parity').value;
  save('rt_pilots',pilots);closeModal();renderAll();
}

function deletePilot(num){
  if(!confirm('Eliminare questo pilota?')) return;
  pilots=pilots.filter(p=>p.num!==num);delete statuses[num];delete trackStatus[num];delete notes[num];
  save('rt_pilots',pilots);save('rt_statuses',statuses);save('rt_track',trackStatus);save('rt_notes',notes);
  closeModal();renderAll();
}

function renderAll(){
  if(activeTab==='piloti') renderPilots();
  if(activeTab==='programma') renderSchedule();
  if(activeTab==='pista') renderPista();
}

renderPilots();
renderSchedule();
</script>
</body>
</html>
